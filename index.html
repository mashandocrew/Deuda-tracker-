
<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DeudaTracker">
  <meta name="theme-color" content="#1a1a1a">
  <title>DeudaTracker</title>
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231a1a1a'/%3E%3Ctext y='.9em' font-size='60' x='50' text-anchor='middle' dominant-baseline='middle' dy='0.1em'%3E%F0%9F%8F%8D%EF%B8%8F%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #1a1a1a; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333333; border-radius: 4px; }
    #root { min-height: 100vh; }
    #loading { position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#1a1a1a;color:#ececec;font-family:'Inter',sans-serif;font-size:16px;z-index:9999; }
  </style>
</head>
<body>
  <div id="loading">Cargando DeudaTracker...</div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@0.383.0/dist/umd/lucide.js"></script>

  <script>
  // ─── diagnostic: verificar globals ───────────────────────────
  window.addEventListener('load', function() {
    var missing = [];
    if (!window.React)   missing.push('React');
    if (!window.ReactDOM) missing.push('ReactDOM');
    if (!window.Chart)   missing.push('Chart.js');
    if (!window.lucide)  missing.push('lucide');
    if (missing.length) {
      document.getElementById('loading').textContent =
        'Error cargando librerías: ' + missing.join(', ') +
        '. Verificá tu conexión a internet.';
      return;
    }
    initApp();
  });

  function initApp() {
    document.getElementById('loading').style.display = 'none';

    var React    = window.React;
    var ReactDOM = window.ReactDOM;

    var useState      = React.useState;
    var useEffect     = React.useEffect;
    var useContext    = React.useContext;
    var createContext = React.createContext;
    var useCallback   = React.useCallback;
    var useRef        = React.useRef;
    var useMemo       = React.useMemo;
    var useId         = React.useId;
    var createElement = React.createElement;
    var Fragment      = React.Fragment;

    // Chart.js está disponible como window.Chart (ya es global automáticamente)

    // Lucide vanilla — crear componentes React wrapper para cada ícono usado
    function createIcon(name) {
      return function Icon(props) {
        var size = props.size || 20;
        var color = props.color || 'currentColor';
        var sx = props.style || {};
        var ref = useRef(null);
        useEffect(function() {
          if (ref.current && window.lucide) {
            ref.current.innerHTML = '';
            var iconData = window.lucide.icons ? window.lucide.icons[name] : window.lucide[name];
            if (iconData) {
              var svg = window.lucide.createElement(iconData);
              if (svg) {
                svg.setAttribute('width', size);
                svg.setAttribute('height', size);
                svg.setAttribute('stroke', color);
                svg.setAttribute('fill', 'none');
                if (sx) Object.assign(svg.style, sx);
                ref.current.appendChild(svg);
              }
            }
          }
        }, [size, color]);
        return createElement('span', { ref: ref, style: Object.assign({ display: 'inline-flex', alignItems: 'center' }, sx) });
      };
    }

    var Plus          = createIcon('plus');
    var Trash2        = createIcon('trash-2');
    var Edit3         = createIcon('edit-3');
    var Paperclip     = createIcon('paperclip');
    var X             = createIcon('x');
    var Sun           = createIcon('sun');
    var Moon          = createIcon('moon');
    var CreditCard    = createIcon('credit-card');
    var ChevronDown   = createIcon('chevron-down');
    var ChevronUp     = createIcon('chevron-up');
    var Calendar      = createIcon('calendar');
    var DollarSign    = createIcon('dollar-sign');
    var TrendingDown  = createIcon('trending-down');
    var Clock         = createIcon('clock');
    var AlertTriangle = createIcon('alert-triangle');
    var Check         = createIcon('check');
    var Download      = createIcon('download');
    var Eye           = createIcon('eye');
    var Bike          = createIcon('bike');
    var Copy          = createIcon('copy');
    var Share2        = createIcon('share-2');
    var History       = createIcon('history');

    // Chart.js components
    function DebtAreaChart(props) {
      var data = props.data, theme = props.theme;
      var canvasRef = useRef(null);
      var chartRef = useRef(null);
      useEffect(function() {
        if (!canvasRef.current || !data || data.length === 0) return;
        if (chartRef.current) chartRef.current.destroy();
        chartRef.current = new Chart(canvasRef.current, {
          type: 'line',
          data: {
            labels: data.map(function(d){ return d.name; }),
            datasets: [{
              label: 'Saldo',
              data: data.map(function(d){ return d.saldo; }),
              borderColor: theme.accent,
              backgroundColor: theme.accent + '30',
              fill: true,
              tension: 0.4,
              pointRadius: 4,
              pointBackgroundColor: theme.accent,
              borderWidth: 2.5,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: function(ctx){ return '$' + Math.round(ctx.raw).toLocaleString('es-AR'); }
                },
                backgroundColor: theme.surface,
                titleColor: theme.text,
                bodyColor: theme.text,
                borderColor: theme.border,
                borderWidth: 1,
              }
            },
            scales: {
              x: { ticks: { color: theme.textSecondary, font: { size: 11 } }, grid: { color: theme.border + '40' } },
              y: {
                ticks: {
                  color: theme.textSecondary, font: { size: 11 },
                  callback: function(v){ return '$' + (v / 1000000).toFixed(1) + 'M'; }
                },
                grid: { color: theme.border + '40' }
              }
            }
          }
        });
        return function() { if (chartRef.current) chartRef.current.destroy(); };
      }, [data, theme]);
      return createElement('div', { style: { height: 220, position: 'relative' } },
        createElement('canvas', { ref: canvasRef })
      );
    }

    function CategoryBarChart(props) {
      var data = props.data, theme = props.theme;
      var canvasRef = useRef(null);
      var chartRef = useRef(null);
      useEffect(function() {
        if (!canvasRef.current || !data || data.length === 0) return;
        if (chartRef.current) chartRef.current.destroy();
        chartRef.current = new Chart(canvasRef.current, {
          type: 'bar',
          data: {
            labels: data.map(function(d){ return d.name; }),
            datasets: [{
              data: data.map(function(d){ return d.monto; }),
              backgroundColor: theme.accent + '90',
              borderColor: theme.accent,
              borderWidth: 1.5,
              borderRadius: 6,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            indexAxis: 'y',
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: function(ctx){ return '$' + Math.round(ctx.raw).toLocaleString('es-AR'); }
                },
                backgroundColor: theme.surface,
                titleColor: theme.text,
                bodyColor: theme.text,
                borderColor: theme.border,
                borderWidth: 1,
              }
            },
            scales: {
              x: { ticks: { color: theme.textSecondary, font: { size: 11 }, callback: function(v){ return '$' + Math.round(v).toLocaleString('es-AR'); } }, grid: { color: theme.border + '40' } },
              y: { ticks: { color: theme.text, font: { size: 12 } }, grid: { display: false } }
            }
          }
        });
        return function() { if (chartRef.current) chartRef.current.destroy(); };
      }, [data, theme]);
      return createElement('div', { style: { height: Math.max(120, data.length * 45), position: 'relative' } },
        createElement('canvas', { ref: canvasRef })
      );
    }

    // ─── shorthand ───────────────────────────────────────────────
    var e = createElement;

    // ============================================================
    // THEME CONTEXT
    // ============================================================
    var ThemeContext    = createContext();
    var QuickPayContext = createContext();
    var ToastContext    = createContext();

    var darkTheme = {
      bg: '#1a1a1a', surface: '#242424', border: '#333333',
      text: '#ececec', textSecondary: '#888888',
      accent: '#DC143C', accentSecondary: '#c01230', accentHover: '#a50f28',
      success: '#22c55e', warning: '#f59e0b', danger: '#ef4444',
      inputBg: '#2a2a2a', modalOverlay: 'rgba(0,0,0,0.7)',
    };
    var lightTheme = {
      bg: '#f5f5f5', surface: '#ffffff', border: '#e0e0e0',
      text: '#1a1a1a', textSecondary: '#666666',
      accent: '#7C3AED', accentSecondary: '#F59E0B', accentHover: '#6d28d9',
      success: '#16a34a', warning: '#d97706', danger: '#dc2626',
      inputBg: '#f0f0f0', modalOverlay: 'rgba(0,0,0,0.4)',
    };

    // ============================================================
    // HELPERS
    // ============================================================
    function fmt(n) {
      if (n == null || isNaN(n)) return '$0';
      return '$' + Math.round(Number(n)).toLocaleString('es-AR');
    }
    function parseArgNum(s) {
      if (typeof s === 'number') return s;
      return Number(String(s).replace(/[^0-9]/g, '')) || 0;
    }
    var monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
    function todayStr() { return new Date().toISOString().split('T')[0]; }
    function addMonths(mesKey, n) {
      var parts = mesKey.split('-').map(Number);
      var y = parts[0], m = parts[1];
      m += n;
      while (m > 12) { m -= 12; y++; }
      while (m < 1)  { m += 12; y--; }
      return y + '-' + String(m).padStart(2,'0');
    }
    function daysUntil(dateStr) {
      if (!dateStr) return Infinity;
      var d = new Date(dateStr + 'T00:00:00');
      var now = new Date(); now.setHours(0,0,0,0);
      return Math.ceil((d - now) / 86400000);
    }

    // ============================================================
    // STORAGE
    // ============================================================
    var defaultPrestamo      = { acreedor: 'Mamá', montoTotal: 2600000, fechaInicio: '2025-01-01', estado: 'en_curso', pagos: [] };
    var defaultNaranjaX      = { nombre: 'Naranja X', movimientos: [], pagosMensuales: [], vencimientos: {} };
    var defaultMercadoCredito= { nombre: 'Mercado Crédito', movimientos: [], pagosMensuales: [], vencimientos: {} };

    function load(key, def) {
      try { var d = localStorage.getItem(key); return d ? JSON.parse(d) : def; }
      catch(e) { return def; }
    }
    function save(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); }
      catch(err) {
        if (err instanceof DOMException && err.name === 'QuotaExceededError')
          window.dispatchEvent(new CustomEvent('storageQuotaExceeded'));
      }
    }

    // ============================================================
    // TOAST PROVIDER
    // ============================================================
    function ToastProvider(props) {
      var state = useState([]);
      var toasts = state[0], setToasts = state[1];
      var add = useCallback(function(msg, type) {
        type = type || 'success';
        var id = uid();
        setToasts(function(p) { return p.concat([{ id: id, msg: msg, type: type }]); });
        setTimeout(function() { setToasts(function(p) { return p.filter(function(t) { return t.id !== id; }); }); }, 3000);
      }, []);

      var colors = { success: '#22c55e', error: '#ef4444', info: '#DC143C' };
      return e(ToastContext.Provider, { value: add },
        props.children,
        e('div', { style: { position:'fixed', bottom:20, right:20, zIndex:9999, display:'flex', flexDirection:'column', gap:8 } },
          toasts.map(function(t) {
            return e('div', {
              key: t.id,
              style: {
                background:'#242424', color:'#ececec', padding:'12px 20px',
                borderRadius:10, borderLeft:'4px solid '+(colors[t.type]||'#DC143C'),
                boxShadow:'0 8px 32px rgba(0,0,0,0.3)', fontSize:14, maxWidth:320,
                animation:'slideIn 0.3s ease', fontFamily:"'Inter',system-ui,sans-serif",
              }
            }, t.msg);
          })
        )
      );
    }

    // ============================================================
    // MODAL
    // ============================================================
    function Modal(props) {
      var open = props.open, onClose = props.onClose, title = props.title, wide = props.wide;
      var theme = useContext(ThemeContext);
      useEffect(function() {
        if (!open) return;
        function handler(ev) { if (ev.key === 'Escape') onClose(); }
        window.addEventListener('keydown', handler);
        return function() { window.removeEventListener('keydown', handler); };
      }, [open, onClose]);
      if (!open) return null;
      return e('div', {
        onClick: onClose,
        style: { position:'fixed', inset:0, background:theme.modalOverlay, display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000, padding:16, animation:'fadeIn 0.2s ease' }
      },
        e('div', {
          onClick: function(ev) { ev.stopPropagation(); },
          style: { background:theme.surface, borderRadius:16, padding:28, width:'100%', maxWidth:wide?720:480, maxHeight:'85vh', overflowY:'auto', border:'1px solid '+theme.border, boxShadow:'0 24px 64px rgba(0,0,0,0.4)', animation:'scaleIn 0.3s ease' }
        },
          e('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 } },
            e('h3', { style: { margin:0, color:theme.text, fontSize:20, fontWeight:700 } }, title),
            e('button', { onClick:onClose, style:{ background:'none', border:'none', color:theme.textSecondary, cursor:'pointer', padding:4 } }, e(X, { size:20 }))
          ),
          props.children
        )
      );
    }

    // ============================================================
    // CONFIRM HOOK
    // ============================================================
    function useConfirm() {
      var state = useState(null);
      var st = state[0], setSt = state[1];
      var confirm = useCallback(function(msg) {
        return new Promise(function(res) { setSt({ msg:msg, resolve:res }); });
      }, []);
      function Dialog() {
        var theme = useContext(ThemeContext);
        if (!st) return null;
        function answer(v) { st.resolve(v); setSt(null); }
        return e(Modal, { open:true, onClose:function(){ answer(false); }, title:'Confirmar' },
          e('p', { style:{ color:theme.text, marginBottom:20, lineHeight:1.5 } }, st.msg),
          e('div', { style:{ display:'flex', gap:12, justifyContent:'flex-end' } },
            e(Btn, { secondary:true, onClick:function(){ answer(false); } }, 'Cancelar'),
            e(Btn, { onClick:function(){ answer(true); } }, 'Confirmar')
          )
        );
      }
      return [confirm, Dialog];
    }

    // ============================================================
    // BTN
    // ============================================================
    function Btn(props) {
      var theme = useContext(ThemeContext);
      var hov = useState(false);
      var isHov = hov[0], setHov = hov[1];
      var base   = props.danger ? theme.danger : props.secondary ? 'transparent' : theme.accent;
      var hovBg  = props.danger ? '#b91c1c'    : props.secondary ? theme.border  : theme.accentHover;
      return e('button', {
        onClick: props.onClick,
        disabled: props.disabled,
        onMouseEnter: function(){ setHov(true); },
        onMouseLeave: function(){ setHov(false); },
        style: Object.assign({
          background: isHov ? hovBg : base,
          color: props.secondary ? theme.text : '#fff',
          border: props.secondary ? '1px solid '+theme.border : 'none',
          padding: props.small ? '6px 14px' : '10px 22px',
          borderRadius:10, cursor: props.disabled ? 'not-allowed' : 'pointer',
          fontSize: props.small ? 13 : 14, fontWeight:600, transition:'all 0.2s ease',
          display:'inline-flex', alignItems:'center', gap:8,
          opacity: props.disabled ? 0.5 : 1,
          fontFamily:"'Inter',system-ui,sans-serif",
        }, props.style || {})
      }, props.children);
    }

    // ============================================================
    // INPUT
    // ============================================================
    function Input(props) {
      var theme = useContext(ThemeContext);
      return e('div', { style:{ marginBottom:14 } },
        props.label && e('label', { style:{ display:'block', color:theme.textSecondary, fontSize:12, marginBottom:6, fontWeight:600, textTransform:'uppercase', letterSpacing:0.5 } }, props.label),
        e('input', {
          type: props.type || 'text',
          value: props.value,
          onChange: function(ev) { props.onChange(ev.target.value); },
          placeholder: props.placeholder,
          style: Object.assign({
            width:'100%', boxSizing:'border-box', padding:'10px 14px', borderRadius:10,
            border:'1px solid '+theme.border, background:theme.inputBg, color:theme.text,
            fontSize:14, outline:'none', transition:'border-color 0.2s ease',
            fontFamily: props.mono ? "'SFMono-Regular',ui-monospace,monospace" : "'Inter',system-ui,sans-serif",
          }, props.style || {}),
          onFocus: function(ev){ ev.target.style.borderColor = theme.accent; },
          onBlur:  function(ev){ ev.target.style.borderColor = theme.border; },
        })
      );
    }

    // ============================================================
    // MONTH INPUT
    // ============================================================
    var supportsMonthInput = (function() {
      var i = document.createElement('input');
      i.setAttribute('type','month');
      return i.type === 'month';
    })();

    function MonthInput(props) {
      var theme = useContext(ThemeContext);
      if (supportsMonthInput) {
        return e(Input, { label:props.label, value:props.value, onChange:props.onChange, type:'month', style:props.style });
      }
      var currentYear = new Date().getFullYear();
      var years = [];
      for (var y = currentYear-2; y <= currentYear+2; y++) years.push(y);
      var parts = props.value ? props.value.split('-') : [String(currentYear), String(new Date().getMonth()+1).padStart(2,'0')];
      var selYear  = Number(parts[0]);
      var selMonth = Number(parts[1]);
      var selStyle = { padding:'10px 14px', borderRadius:10, border:'1px solid '+theme.border, background:theme.inputBg, color:theme.text, fontSize:14, outline:'none', fontFamily:"'Inter',system-ui,sans-serif" };
      return e('div', { style: Object.assign({ marginBottom:14 }, props.style||{}) },
        props.label && e('label', { style:{ display:'block', color:theme.textSecondary, fontSize:12, marginBottom:6, fontWeight:600, textTransform:'uppercase', letterSpacing:0.5 } }, props.label),
        e('div', { style:{ display:'flex', gap:8 } },
          e('select', { value:selMonth, onChange:function(ev){ props.onChange(String(selYear)+'-'+String(Number(ev.target.value)).padStart(2,'0')); }, style:Object.assign({},selStyle,{flex:1}) },
            monthNames.map(function(name,i){ return e('option',{key:i+1,value:i+1},name); })
          ),
          e('select', { value:selYear, onChange:function(ev){ props.onChange(ev.target.value+'-'+String(selMonth).padStart(2,'0')); }, style:Object.assign({},selStyle,{width:90}) },
            years.map(function(y){ return e('option',{key:y,value:y},y); })
          )
        )
      );
    }

    // ============================================================
    // SELECT
    // ============================================================
    function Select(props) {
      var theme = useContext(ThemeContext);
      return e('div', { style:{ marginBottom:14 } },
        props.label && e('label', { style:{ display:'block', color:theme.textSecondary, fontSize:12, marginBottom:6, fontWeight:600, textTransform:'uppercase', letterSpacing:0.5 } }, props.label),
        e('select', {
          value: props.value,
          onChange: function(ev){ props.onChange(ev.target.value); },
          style: { width:'100%', padding:'10px 14px', borderRadius:10, border:'1px solid '+theme.border, background:theme.inputBg, color:theme.text, fontSize:14, outline:'none', fontFamily:"'Inter',system-ui,sans-serif" }
        }, props.options.map(function(o){ return e('option',{key:o.value,value:o.value},o.label); }))
      );
    }

    // ============================================================
    // CARD / STATCARD
    // ============================================================
    function Card(props) {
      var theme = useContext(ThemeContext);
      return e('div', { style:Object.assign({ background:theme.surface, border:'1px solid '+theme.border, borderRadius:16, padding:24 }, props.style||{}) }, props.children);
    }

    function StatCard(props) {
      var theme = useContext(ThemeContext);
      var accent = props.accent || theme.accent;
      return e('div', { style:{ background:theme.surface, border:'1px solid '+theme.border, borderRadius:14, padding:'18px 20px', display:'flex', alignItems:'center', gap:14, minWidth:0 } },
        e('div', { style:{ width:42, height:42, borderRadius:12, background:accent+'18', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 } },
          e(props.icon, { size:20, color:accent })
        ),
        e('div', { style:{ minWidth:0 } },
          e('div', { style:{ color:theme.textSecondary, fontSize:11, fontWeight:600, textTransform:'uppercase', letterSpacing:0.6, marginBottom:2 } }, props.label),
          e('div', { style:{ color:theme.text, fontSize:18, fontWeight:700, fontFamily:"'SFMono-Regular',ui-monospace,monospace", whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' } }, props.value)
        )
      );
    }

    // ============================================================
    // MOTO PROGRESS SVG
    // ============================================================
    function MotoProgress(props) {
      var percent = props.percent;
      var theme   = props.theme;
      var fill    = theme.accent;
      var stroke  = theme.textSecondary;
      var motoId  = useId();
      var animRef = useRef(0);
      var animState = useState(0);
      var animatedPercent = animState[0], setAnimatedPercent = animState[1];

      useEffect(function() {
        var rafId;
        function animate() {
          var current = animRef.current;
          var diff = percent - current;
          if (Math.abs(diff) <= 0.5) { animRef.current = percent; setAnimatedPercent(percent); return; }
          animRef.current = current + (diff > 0 ? 0.5 : -0.5);
          setAnimatedPercent(animRef.current);
          rafId = requestAnimationFrame(animate);
        }
        rafId = requestAnimationFrame(animate);
        return function() { cancelAnimationFrame(rafId); };
      }, [percent]);

      var spokeAngles = [0,30,60,90,120,150,180,210,240,270,300,330];

      function Wheel(wp) {
        var cx=wp.cx,cy=wp.cy,r=wp.r,prefix=wp.prefix,color=wp.color,opacity=wp.opacity;
        return e('g', null,

      return e('div',null,
        e('div',{ style:{ display:'flex', gap:4, marginBottom:20, background:theme.surface, borderRadius:14, padding:4, border:'1px solid '+theme.border } },
          [{id:'naranjax',label:'🟠 Naranja X',desc:'Tarjeta de crédito'},{id:'mercadocredito',label:'🔵 Mercado Crédito',desc:'Crédito personal'}].map(function(t){
            return e('button',{ key:t.id, onClick:function(){ setTab(t.id); }, style:{ flex:1, padding:'12px 16px', borderRadius:10, border:'none', cursor:'pointer', background:activeTab===t.id?theme.accent:'transparent', color:activeTab===t.id?'#fff':theme.textSecondary, transition:'all 0.2s ease', fontFamily:"'Inter',system-ui,sans-serif", fontSize:14, fontWeight:600 } },
              e('div',null,t.label),
              e('div',{ style:{ fontSize:11, fontWeight:400, opacity:0.8, marginTop:2 } },t.desc)
            );
          })
        ),
        activeTab==='naranjax'
          ? e(CreditoModule,{ storageKey:'deudatracker_naranjax', defaultData:defaultNaranjaX })
          : e(CreditoModule,{ storageKey:'deudatracker_mercadocredito', defaultData:defaultMercadoCredito })
      );
    }

    // ============================================================
    // QUOTA LISTENER
    // ============================================================
    function QuotaListener() {
      var toast = useContext(ToastContext);
      useEffect(function(){
        function handler(){ toast('⚠️ Almacenamiento lleno. Eliminá comprobantes para liberar espacio.','error'); }
        window.addEventListener('storageQuotaExceeded', handler);
        return function(){ window.removeEventListener('storageQuotaExceeded', handler); };
      }, [toast]);
      return null;
    }

    // ============================================================
    // MAIN APP
    // ============================================================
    function DeudaTracker() {
      var isDarkState = useState(function(){
        var saved = localStorage.getItem('deudatracker_theme');
        return saved ? saved==='dark' : true;
      });
      var isDark = isDarkState[0], setIsDark = isDarkState[1];
      var theme = isDark ? darkTheme : lightTheme;

      var tabState = useState('prestamo');
      var activeTab=tabState[0], setActiveTab=tabState[1];

      var qpState = useState(false);
      var quickPayOpen=qpState[0], setQuickPayOpen=qpState[1];

      var fabState = useState(false);
      var fabHov=fabState[0], setFabHov=fabState[1];

      var mobState = useState(window.innerWidth < 600);
      var isMobile=mobState[0], setIsMobile=mobState[1];

      useEffect(function(){
        function handler(){ setIsMobile(window.innerWidth<600); }
        window.addEventListener('resize', handler);
        return function(){ window.removeEventListener('resize', handler); };
      }, []);

      useEffect(function(){
        localStorage.setItem('deudatracker_theme', isDark?'dark':'light');
        // update scrollbar color
        var style = document.getElementById('dynamic-style');
        if (!style){ style=document.createElement('style'); style.id='dynamic-style'; document.head.appendChild(style); }
        style.textContent = 'input[type="date"]::-webkit-calendar-picker-indicator{filter:'+(isDark?'invert(1)':'none')+'} ::-webkit-scrollbar-thumb{background:'+theme.border+';}';
      }, [isDark, theme]);

      return e(ThemeContext.Provider, { value: theme },
        e(ToastProvider, null,
          e(QuickPayContext.Provider, { value: { quickPayOpen:quickPayOpen, setQuickPayOpen:setQuickPayOpen } },
            e(QuotaListener, null),
            e('div', { style: { minHeight:'100vh', background:theme.bg, color:theme.text, fontFamily:"'Inter',system-ui,-apple-system,sans-serif", transition:'background 0.3s ease, color 0.3s ease' } },

              e('header', { style: { position:'sticky', top:0, zIndex:100, background:theme.surface+'ee', backdropFilter:'blur(12px)', borderBottom:'1px solid '+theme.border, padding:'0 20px' } },
                e('div', { style: { maxWidth:960, margin:'0 auto', display:'flex', alignItems:'center', height:64, gap:16 } },
                  e('div', { style: { display:'flex', alignItems:'center', gap:10, flexShrink:0 } },
                    e('div', { style: { width:36, height:36, borderRadius:10, background:'linear-gradient(135deg, '+theme.accent+', '+theme.accentHover+')', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:800, fontSize:16 } }, 'D'),
                    e('span', { style: { fontWeight:800, fontSize:18, color:theme.text, letterSpacing:-0.5 } },
                      'Deuda', e('span',{ style:{ color:theme.accent } },'Tracker')
                    )
                  ),
                  e('nav', { style: { display:'flex', gap:4, flex:1, justifyContent:'center' } },
                    [{id:'prestamo',label:'🏍️ Préstamo'},{id:'creditos',label:'💳 Créditos'}].map(function(t){
                      return e('button',{ key:t.id, onClick:function(){ setActiveTab(t.id); }, style:{ padding:'8px 20px', borderRadius:10, border:'none', cursor:'pointer', background:activeTab===t.id?theme.accent+'20':'transparent', color:activeTab===t.id?theme.accent:theme.textSecondary, fontWeight:600, fontSize:14, transition:'all 0.2s ease', fontFamily:"'Inter',system-ui,sans-serif" } }, t.label);
                    })
                  ),
                  e('button', { onClick:function(){ setIsDark(function(d){ return !d; }); }, style: { background:theme.bg, border:'1px solid '+theme.border, borderRadius:10, width:40, height:40, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', color:theme.textSecondary, transition:'all 0.2s ease', flexShrink:0 } },
                    isDark ? e(Sun,{size:18}) : e(Moon,{size:18})
                  )
                )
              ),

              e('main', { style: { maxWidth:960, margin:'0 auto', padding:'24px 20px 100px' } },
                activeTab==='prestamo' ? e(PrestamoModule,null) : e(CreditosModule,null)
              ),

              e('div', { style: { textAlign:'center', padding:'20px', color:theme.textSecondary, fontSize:12, borderTop:'1px solid '+theme.border } },
                'DeudaTracker · '+new Date().toLocaleDateString('es-AR')
              ),

              activeTab==='prestamo' && e('button', {
                onClick: function(){ setQuickPayOpen(true); },
                onMouseEnter: function(){ setFabHov(true); },
                onMouseLeave: function(){ setFabHov(false); },
                title: 'Registrar pago rápido',
                style: { position:'fixed', bottom:isMobile?80:24, left:24, zIndex:500, width:56, height:56, borderRadius:'50%', background:theme.accent, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:fabHov?'0 8px 25px rgba(0,0,0,0.4)':'0 4px 15px rgba(0,0,0,0.25)', transform:fabHov?'scale(1.08)':'scale(1)', transition:'all 0.2s ease' }
              }, e(Plus,{ size:24, color:'#fff' }))
            )
          )
        )
      );
    }

    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(e(DeudaTracker, null));
  } // end initApp
  </script>
</body>
</html>
