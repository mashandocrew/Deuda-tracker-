<body>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>

  <script>
  // ─── diagnostic: verificar globals ───────────────────────────
  window.addEventListener('load', function() {
    var missing = [];
    if (!window.React)   missing.push('React');
    if (!window.ReactDOM) missing.push('ReactDOM');
    if (!window.Recharts) missing.push('Recharts');
    if (!window.lucide)  missing.push('lucide');
    if (missing.length) {
      document.getElementById('loading').textContent =
        'Error cargando librerías: ' + missing.join(', ') +
        '. Verificá tu conexión a internet.';
      return;
    }
    initApp();
  });

  function initApp() {
    document.getElementById('loading').style.display = 'none';

    var React    = window.React;
    var ReactDOM = window.ReactDOM;

    var useState      = React.useState;
    var useEffect     = React.useEffect;
    var useContext    = React.useContext;
    var createContext = React.createContext;
    var useCallback   = React.useCallback;
    var useRef        = React.useRef;
    var useMemo       = React.useMemo;
    var useId         = React.useId;
    var createElement = React.createElement;
    var Fragment      = React.Fragment;

    var R = window.Recharts;
    var BarChart          = R.BarChart;
    var Bar               = R.Bar;
    var XAxis             = R.XAxis;
    var YAxis             = R.YAxis;
    var CartesianGrid     = R.CartesianGrid;
    var Tooltip           = R.Tooltip;
    var ResponsiveContainer = R.ResponsiveContainer;
    var AreaChart         = R.AreaChart;
    var Area              = R.Area;

    // Lucide icons — helper para crear icono SVG simple si lucide falla
    function makeIcon(name) {
      var L = window.lucide;
      if (L && L.createElement) {
        // lucide UMD expone createIcons / createElement diferente según versión
      }
      // Fallback: retorna un span con el nombre
      return function Icon(props) {
        var size = props.size || 16;
        var color = props.color || 'currentColor';
        var L = window.lucide;
        if (L && L[name]) {
          // lucide@0.383 UMD: each icon is an array [tag, attrs, children]
          var iconDef = L[name];
          if (Array.isArray(iconDef)) {
            var children = (iconDef[2] || []).map(function(child, i) {
              return createElement(child[0], Object.assign({ key: i }, child[1]));
            });
            return createElement('svg', Object.assign({
              xmlns: 'http://www.w3.org/2000/svg',
              width: size, height: size,
              viewBox: '0 0 24 24',
              fill: 'none',
              stroke: color,
              strokeWidth: 2,
              strokeLinecap: 'round',
              strokeLinejoin: 'round',
              style: props.style || {}
            }, iconDef[1] || {}), children);
          }
        }
        return createElement('span', { style: { width: size, height: size, display: 'inline-block', fontSize: size * 0.6, color: color } }, '');
      };
    }

    var Plus          = makeIcon('Plus');
    var Trash2        = makeIcon('Trash2');
    var Edit3         = makeIcon('Edit3');
    var Paperclip     = makeIcon('Paperclip');

    var TrendingDown  = makeIcon('TrendingDown');
    var Clock         = makeIcon('Clock');
    var AlertTriangle = makeIcon('AlertTriangle');
    var Check         = makeIcon('Check');

    var Eye           = makeIcon('Eye');

    // ─── shorthand ───────────────────────────────────────────────

    // ============================================================
    // THEME CONTEXT
    // ============================================================

    var darkTheme = {

    var lightTheme = {
      bg: '#f5f5f5', surface: '#ffffff', border: '#e0e0e0',
      text: '#1a1a1a', textSecondary: '#666666',
      accent: '#7C3AED', accentSecondary: '#F59E0B', accentHover: '#6d28d9',

    // ============================================================
    // HELPERS
    // ============================================================
    function fmt(n) {
      if (n == null || isNaN(n)) return '$0';
      return '$' + Math.round(Number(n)).toLocaleString('es-AR');
    }
    function parseArgNum(s) {
      if (typeof s === 'number') return s;
      return Number(String(s).replace(/[^0-9]/g, '')) || 0;
    }
    var monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
    function todayStr() { return new Date().toISOString().split('T')[0]; }
    function addMonths(mesKey, n) {
      var parts = mesKey.split('-').map(Number);
      var y = parts[0], m = parts[1];
      m += n;
      while (m > 12) { m -= 12; y++; }
      while (m < 1)  { m += 12; y--; }
      return y + '-' + String(m).padStart(2,'0');
    }
    function daysUntil(dateStr) {
      if (!dateStr) return Infinity;
      var d = new Date(dateStr + 'T00:00:00');
      var now = new Date(); now.setHours(0,0,0,0);
      return Math.ceil((d - now) / 86400000);
    }

    // ============================================================
    // STORAGE
    // ============================================================
    var defaultPrestamo      = { acreedor: 'Mamá', montoTotal: 2600000, fechaInicio: '2025-01-01', estado: 'en_curso', pagos: [] };
    var defaultNaranjaX      = { nombre: 'Naranja X', movimientos: [], pagosMensuales: [], vencimientos: {} };
    var defaultMercadoCredito= { nombre: 'Mercado Crédito', movimientos: [], pagosMensuales: [], vencimientos: {} };

    function load(key, def) {
      try { var d = localStorage.getItem(key); return d ? JSON.parse(d) : def; }
      catch(e) { return def; }
    }
    function save(key, val) {
      try { localStorage.setItem(key, JSON.stringify(val)); }
      catch(err) {
        if (err instanceof DOMException && err.name === 'QuotaExceededError')
          window.dispatchEvent(new CustomEvent('storageQuotaExceeded'));
      }
    }

    // ============================================================
    // TOAST PROVIDER
    // ============================================================
    function ToastProvider(props) {
      var state = useState([]);
      var toasts = state[0], setToasts = state[1];
      var add = useCallback(function(msg, type) {
        type = type || 'success';
        var id = uid();
        setToasts(function(p) { return p.concat([{ id: id, msg: msg, type: type }]); });
        setTimeout(function() { setToasts(function(p) { return p.filter(function(t) { return t.id !== id; }); }); }, 3000);
      }, []);

      var colors = { success: '#22c55e', error: '#ef4444', info: '#DC143C' };
      return e(ToastContext.Provider, { value: add },
        props.children,
        e('div', { style: { position:'fixed', bottom:20, right:20, zIndex:9999, display:'flex', flexDirection:'column', gap:8 } },
          toasts.map(function(t) {
            return e('div', {
              key: t.id,

                borderRadius:10, borderLeft:'4px solid '+(colors[t.type]||'#DC143C'),

                animation:'slideIn 0.3s ease', fontFamily:"'Inter',system-ui,sans-serif",
              }
            }, t.msg);
          })
        )
      );
    }

    // ============================================================
    // MODAL
    // ============================================================
    function Modal(props) {
      var open = props.open, onClose = props.onClose, title = props.title, wide = props.wide;
      var theme = useContext(ThemeContext);
      useEffect(function() {
        if (!open) return;
        function handler(ev) { if (ev.key === 'Escape') onClose(); }
        window.addEventListener('keydown', handler);
        return function() { window.removeEventListener('keydown', handler); };
      }, [open, onClose]);
      if (!open) return null;
      return e('div', {
        onClick: onClose,
        style: { position:'fixed', inset:0, background:theme.modalOverlay, display:'flex', alignItems:'center', justifyContent:'center', zIndex:1000, padding:16, animation:'fadeIn 0.2s ease' }
      },
        e('div', {
          onClick: function(ev) { ev.stopPropagation(); },
          style: { background:theme.surface, borderRadius:16, padding:28, width:'100%', maxWidth:wide?720:480, maxHeight:'85vh', overflowY:'auto', border:'1px solid '+theme.border, boxShadow:'0 24px 64px rgba(0,0,0,0.4)', animation:'scaleIn 0.3s ease' }
        },
          e('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 } },
            e('h3', { style: { margin:0, color:theme.text, fontSize:20, fontWeight:700 } }, title),
            e('button', { onClick:onClose, style:{ background:'none', border:'none', color:theme.textSecondary, cursor:'pointer', padding:4 } }, e(X, { size:20 }))
          ),
          props.children
        )
      );
    }

    // ============================================================
    // CONFIRM HOOK
    // ============================================================
    function useConfirm() {
      var state = useState(null);
      var st = state[0], setSt = state[1];
      var confirm = useCallback(function(msg) {
        return new Promise(function(res) { setSt({ msg:msg, resolve:res }); });
      }, []);
      function Dialog() {
        var theme = useContext(ThemeContext);
        if (!st) return null;
        function answer(v) { st.resolve(v); setSt(null); }
        return e(Modal, { open:true, onClose:function(){ answer(false); }, title:'Confirmar' },
          e('p', { style:{ color:theme.text, marginBottom:20, lineHeight:1.5 } }, st.msg),
          e('div', { style:{ display:'flex', gap:12, justifyContent:'flex-end' } },
            e(Btn, { secondary:true, onClick:function(){ answer(false); } }, 'Cancelar'),
            e(Btn, { onClick:function(){ answer(true); } }, 'Confirmar')
          )
        );
      }
      return [confirm, Dialog];
    }

    // ============================================================
    // BTN
    // ============================================================
    function Btn(props) {
      var theme = useContext(ThemeContext);
      var hov = useState(false);
      var isHov = hov[0], setHov = hov[1];
      var base   = props.danger ? theme.danger : props.secondary ? 'transparent' : theme.accent;
      var hovBg  = props.danger ? '#b91c1c'    : props.secondary ? theme.border  : theme.accentHover;
      return e('button', {
        onClick: props.onClick,
        disabled: props.disabled,
        onMouseEnter: function(){ setHov(true); },
        onMouseLeave: function(){ setHov(false); },
        style: Object.assign({
          background: isHov ? hovBg : base,
          color: props.secondary ? theme.text : '#fff',
          border: props.secondary ? '1px solid '+theme.border : 'none',
          padding: props.small ? '6px 14px' : '10px 22px',
          borderRadius:10, cursor: props.disabled ? 'not-allowed' : 'pointer',
          fontSize: props.small ? 13 : 14, fontWeight:600, transition:'all 0.2s ease',
          display:'inline-flex', alignItems:'center', gap:8,
          opacity: props.disabled ? 0.5 : 1,
          fontFamily:"'Inter',system-ui,sans-serif",
        }, props.style || {})
      }, props.children);
    }

    // ============================================================
    // INPUT
    // ============================================================
    function Input(props) {
      var theme = useContext(ThemeContext);
      return e('div', { style:{ marginBottom:14 } },
        props.label && e('label', { style:{ display:'block', color:theme.textSecondary, fontSize:12, marginBottom:6, fontWeight:600, textTransform:'uppercase', letterSpacing:0.5 } }, props.label),
        e('input', {

      var years = [];
      for (var y = currentYear-2; y <= currentYear+2; y++) years.push(y);
      var parts = props.value ? props.value.split('-') : [String(currentYear), String(new Date().getMonth()+1).padStart(2,'0')];

      return e('div', { style: Object.assign({ marginBottom:14 }, props.style||{}) },

        e('div', { style:{ display:'flex', gap:8 } },

    // ============================================================

    function Select(props) {

        )

    // ============================================================
    // MOTO PROGRESS SVG
    // ============================================================
    function MotoProgress(props) {
      var percent = props.percent;
      var theme   = props.theme;
      var fill    = theme.accent;
      var stroke  = theme.textSecondary;

        var rafId;

          setAnimatedPercent(animRef.current);
          rafId = requestAnimationFrame(animate);

          e('circle',{cx:cx,cy:cy,r:6,fill:color,fillOpacity:opacity*0.5,stroke:color,strokeWidth:1.5,opacity:opacity}),

            return e('line',{key:prefix+a,x1:cx+8*Math.cos(a*Math.PI/180),y1:cy+8*Math.sin(a*Math.PI/180),x2:cx+(r-9)*Math.cos(a*Math.PI/180),y2:cy+(r-9)*Math.sin(a*Math.PI/180),stroke:color,strokeWidth:0.8,opacity:opacity});

          [148,154,160,166].map(function(yy){ return e('line',{key:'fin'+yy,x1:222,y1:yy,x2:215,y2:yy,strokeWidth:1.5}); }),
          e('path',{d:'M232 182 L235 195 L255 195 L258 182',fill:color,fillOpacity:fillOpacity*0.1}),
          e('path',{d:'M258 172 L275 180 L280 195 L270 208',strokeWidth:2}),
          e('path',{d:'M270 208 L245 218 L200 228 L155 232 L128 234',strokeWidth:3.5,strokeLinecap:'round'}),
          e('ellipse',{cx:125,cy:234,rx:8,ry:5,fill:color,fillOpacity:fillOpacity*0.2,strokeWidth:1.5}),
          e('path',{d:'M255 98 C260 80 285 70 318 72 L332 80 L335 95 L320 108 L280 112 L260 108 Z',fill:color,fillOpacity:fillOpacity*0.25,strokeWidth:2}),
          e('path',{d:'M205 128 L225 118 L260 108 L280 112 L268 120 L238 128 L215 135 Z',fill:color,fillOpacity:fillOpacity*0.12,strokeWidth:1.8}),
          e('path',{d:'M150 155 L180 140 L205 128 L195 135 L165 148 Z',fill:color,fillOpacity:fillOpacity*0.1,strokeWidth:1.5}),
          e('rect',{x:132,y:158,width:10,height:4,rx:2,fill:fill,fillOpacity:fillOpacity*0.8,stroke:color,strokeWidth:1}),
          e('path',{d:'M335 95 L350 82 L358 72',strokeWidth:2.5}),
