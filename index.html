<!--
  DEUDATRACKER — Instrucciones de instalación en celular

  ANDROID (Chrome):
  1. Abrí este archivo en Chrome
  2. Menú (⋮) → "Agregar a pantalla de inicio"
  3. Confirmá → queda como ícono de app

  iOS (Safari):
  1. Abrí este archivo en Safari
  2. Botón compartir (□↑) → "Agregar a pantalla de inicio"
  3. Confirmá → queda como ícono sin barra del navegador

  Para pasar el archivo al celular:
  - Android: conectá por USB y copiá el archivo a Descargas
  - iOS: mandátelo por AirDrop, Mail o guardalo en iCloud Drive
  - Ambos: subilo a Google Drive y descargalo desde el celular
-->
<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DeudaTracker">

  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }

    input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333333; border-radius: 4px; }
  </style>
  <script>
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'deudatracker-v1';
        const URLS = [
          'https://unpkg.com/react@18/umd/react.production.min.js',
          'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
          'https://unpkg.com/@babel/standalone/babel.min.js',
          'https://unpkg.com/recharts@2/umd/Recharts.js',
          'https://unpkg.com/lucide-react@0.383.0/dist/umd/lucide-react.js',
          'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap'
        ];
        self.addEventListener('install', e =>
          e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS)))
        );
        self.addEventListener('fetch', e =>
          e.respondWith(
            caches.match(e.request).then(r => r || fetch(e.request))
          )
        );
      `;
      const blob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl)
        .catch(e => console.warn('SW no disponible:', e));
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
  <script src="https://unpkg.com/lucide-react@0.383.0/dist/umd/lucide-react.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useContext, createContext, useCallback, useRef, useMemo, useId } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, AreaChart, Area } = Recharts;
    const { Plus, Trash2, Edit3, Paperclip, X, Sun, Moon, CreditCard,
            ChevronDown, ChevronUp, Search, Calendar, DollarSign,
            TrendingDown, Clock, AlertTriangle, Check, Download, Eye,
            Bike, Copy, Share2, History } = lucide;

    // ============================================================
    // THEME CONTEXT
    // ============================================================
    const ThemeContext = createContext();
    const QuickPayContext = createContext();
    const darkTheme = {
      bg: "#1a1a1a", surface: "#242424", border: "#333333",
      text: "#ececec", textSecondary: "#888888",
      accent: "#DC143C", accentSecondary: "#c01230", accentHover: "#a50f28",
      success: "#22c55e", warning: "#f59e0b", danger: "#ef4444",
      inputBg: "#2a2a2a", modalOverlay: "rgba(0,0,0,0.7)",
    };
    const lightTheme = {
      bg: "#f5f5f5", surface: "#ffffff", border: "#e0e0e0",
      text: "#1a1a1a", textSecondary: "#666666",
      accent: "#7C3AED", accentSecondary: "#F59E0B", accentHover: "#6d28d9",
      success: "#16a34a", warning: "#d97706", danger: "#dc2626",
      inputBg: "#f0f0f0", modalOverlay: "rgba(0,0,0,0.4)",
    };

    // ============================================================
    // HELPERS
    // ============================================================
    const fmt = (n) => {
      if (n == null || isNaN(n)) return "$0";
      return "$" + Math.round(Number(n)).toLocaleString("es-AR");
    };
    const parseArgNum = (s) => {
      if (typeof s === "number") return s;
      return Number(String(s).replace(/[^0-9]/g, "")) || 0;
    };
    const monthNames = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    const todayStr = () => new Date().toISOString().split("T")[0];
    const addMonths = (mesKey, n) => {
      let [y, m] = mesKey.split("-").map(Number);
      m += n;
      while (m > 12) { m -= 12; y++; }
      while (m < 1) { m += 12; y--; }
      return `${y}-${String(m).padStart(2, "0")}`;
    };
    const daysUntil = (dateStr) => {
      if (!dateStr) return Infinity;
      const d = new Date(dateStr + "T00:00:00");
      const now = new Date(); now.setHours(0,0,0,0);
      return Math.ceil((d - now) / 86400000);
    };

    // ============================================================
    // DATA DEFAULTS
    // ============================================================
    const defaultPrestamo = { acreedor: "Mamá", montoTotal: 2600000, fechaInicio: "2025-01-01", estado: "en_curso", pagos: [] };
    const defaultNaranjaX = { nombre: "Naranja X", movimientos: [], pagosMensuales: [], vencimientos: {} };
    const defaultMercadoCredito = { nombre: "Mercado Crédito", movimientos: [], pagosMensuales: [], vencimientos: {} };
    const load = (key, def) => { try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : def; } catch { return def; } };
    const save = (key, val) => {
      try { localStorage.setItem(key, JSON.stringify(val)); }
      catch(e) {
        if (e instanceof DOMException && e.name === 'QuotaExceededError') {
          window.dispatchEvent(new CustomEvent('storageQuotaExceeded'));
        }
      }
    };

    // ============================================================
    // TOAST SYSTEM
    // ============================================================
    const ToastContext = createContext();
    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const add = useCallback((msg, type = "success") => {
        const id = uid();
        setToasts(p => [...p, { id, msg, type }]);
        setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3000);
      }, []);
      return (
        <ToastContext.Provider value={add}>
          {children}
          <div style={{ position: "fixed", bottom: 20, right: 20, zIndex: 9999, display: "flex", flexDirection: "column", gap: 8 }}>
            {toasts.map(t => {
              const colors = { success: "#22c55e", error: "#ef4444", info: "#DC143C" };
              return (
                <div key={t.id} style={{
                  background: "#242424", color: "#ececec", padding: "12px 20px",
                  borderRadius: 10, borderLeft: `4px solid ${colors[t.type] || "#DC143C"}`,
                  boxShadow: "0 8px 32px rgba(0,0,0,0.3)", fontSize: 14, maxWidth: 320,
                  animation: "slideIn 0.3s ease", fontFamily: "'Inter', system-ui, sans-serif",
                }}>{t.msg}</div>
              );
            })}
          </div>
        </ToastContext.Provider>
      );
    }

    // ============================================================
    // MODAL
    // ============================================================
    function Modal({ open, onClose, title, children, wide }) {
      const theme = useContext(ThemeContext);
      useEffect(() => {
        if (!open) return;
        const handler = (e) => { if (e.key === "Escape") onClose(); };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [open, onClose]);
      if (!open) return null;
      return (
        <div onClick={onClose} style={{
          position: "fixed", inset: 0, background: theme.modalOverlay,
          display: "flex", alignItems: "center", justifyContent: "center",
          zIndex: 1000, padding: 16, animation: "fadeIn 0.2s ease",
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            background: theme.surface, borderRadius: 16, padding: 28,
            width: "100%", maxWidth: wide ? 720 : 480, maxHeight: "85vh",
            overflowY: "auto", border: `1px solid ${theme.border}`,
            boxShadow: "0 24px 64px rgba(0,0,0,0.4)", animation: "scaleIn 0.3s ease",
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <h3 style={{ margin: 0, color: theme.text, fontSize: 20, fontWeight: 700 }}>{title}</h3>
              <button onClick={onClose} style={{ background: "none", border: "none", color: theme.textSecondary, cursor: "pointer", padding: 4 }}><X size={20} /></button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    // ============================================================
    // CONFIRM DIALOG HOOK
    // ============================================================
    function useConfirm() {
      const [state, setState] = useState(null);
      const confirm = useCallback((msg) => new Promise(res => setState({ msg, resolve: res })), []);
      const Dialog = () => {
        const theme = useContext(ThemeContext);
        if (!state) return null;
        const answer = (v) => { state.resolve(v); setState(null); };
        return (
          <Modal open={true} onClose={() => answer(false)} title="Confirmar">
            <p style={{ color: theme.text, marginBottom: 20, lineHeight: 1.5 }}>{state.msg}</p>
            <div style={{ display: "flex", gap: 12, justifyContent: "flex-end" }}>
              <Btn secondary onClick={() => answer(false)}>Cancelar</Btn>
              <Btn onClick={() => answer(true)}>Confirmar</Btn>
            </div>
          </Modal>
        );
      };
      return [confirm, Dialog];
    }

    // ============================================================
    // REUSABLE UI COMPONENTS
    // ============================================================
    function Btn({ children, onClick, secondary, danger, small, disabled, style: sx }) {
      const theme = useContext(ThemeContext);
      const [hov, setHov] = useState(false);
      const base = danger ? theme.danger : secondary ? "transparent" : theme.accent;
      const hovBg = danger ? "#b91c1c" : secondary ? theme.border : theme.accentHover;
      return (
        <button onClick={onClick} disabled={disabled}
          onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
          style={{
            background: hov ? hovBg : base, color: secondary ? theme.text : "#fff",
            border: secondary ? `1px solid ${theme.border}` : "none",
            padding: small ? "6px 14px" : "10px 22px", borderRadius: 10, cursor: disabled ? "not-allowed" : "pointer",
            fontSize: small ? 13 : 14, fontWeight: 600, transition: "all 0.2s ease",
            display: "inline-flex", alignItems: "center", gap: 8, opacity: disabled ? 0.5 : 1,
            fontFamily: "'Inter', system-ui, sans-serif", ...sx,
          }}>{children}</button>
      );
    }

    function Input({ label, value, onChange, type = "text", placeholder, mono, style: sx }) {
      const theme = useContext(ThemeContext);
      return (
        <div style={{ marginBottom: 14 }}>
          {label && <label style={{ display: "block", color: theme.textSecondary, fontSize: 12, marginBottom: 6, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</label>}
          <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
            style={{
              width: "100%", boxSizing: "border-box", padding: "10px 14px", borderRadius: 10,
              border: `1px solid ${theme.border}`, background: theme.inputBg, color: theme.text,
              fontSize: 14, outline: "none", transition: "border-color 0.2s ease",
              fontFamily: mono ? "'SFMono-Regular', ui-monospace, monospace" : "'Inter', system-ui, sans-serif", ...sx,
            }}
            onFocus={e => e.target.style.borderColor = theme.accent}
            onBlur={e => e.target.style.borderColor = theme.border}
          />
        </div>
      );
    }

    // ============================================================
    // MONTH INPUT — fallback for iOS/Safari
    // ============================================================
    const supportsMonthInput = (() => {
      const i = document.createElement('input');
      i.setAttribute('type', 'month');
      return i.type === 'month';
    })();

    function MonthInput({ label, value, onChange, style: sx }) {
      const theme = useContext(ThemeContext);
      if (supportsMonthInput) {
        return <Input label={label} value={value} onChange={onChange} type="month" style={sx} />;
      }
      const currentYear = new Date().getFullYear();
      const years = [];
      for (let y = currentYear - 2; y <= currentYear + 2; y++) years.push(y);
      const parts = value ? value.split("-") : [String(currentYear), String(new Date().getMonth() + 1).padStart(2, "0")];
      const selYear = Number(parts[0]);
      const selMonth = Number(parts[1]);
      const selStyle = {
        padding: "10px 14px", borderRadius: 10,
        border: `1px solid ${theme.border}`, background: theme.inputBg, color: theme.text,
        fontSize: 14, outline: "none", fontFamily: "'Inter', system-ui, sans-serif",
      };
      return (
        <div style={{ marginBottom: 14, ...sx }}>
          {label && <label style={{ display: "block", color: theme.textSecondary, fontSize: 12, marginBottom: 6, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</label>}
          <div style={{ display: "flex", gap: 8 }}>
            <select value={selMonth} onChange={e => onChange(`${String(selYear)}-${String(Number(e.target.value)).padStart(2, "0")}`)} style={{ ...selStyle, flex: 1 }}>
              {monthNames.map((name, i) => <option key={i + 1} value={i + 1}>{name}</option>)}
            </select>
            <select value={selYear} onChange={e => onChange(`${e.target.value}-${String(selMonth).padStart(2, "0")}`)} style={{ ...selStyle, width: 90 }}>
              {years.map(y => <option key={y} value={y}>{y}</option>)}
            </select>
          </div>
        </div>
      );
    }

    function Select({ label, value, onChange, options }) {
      const theme = useContext(ThemeContext);
      return (
        <div style={{ marginBottom: 14 }}>
          {label && <label style={{ display: "block", color: theme.textSecondary, fontSize: 12, marginBottom: 6, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</label>}
          <select value={value} onChange={e => onChange(e.target.value)} style={{
            width: "100%", padding: "10px 14px", borderRadius: 10, border: `1px solid ${theme.border}`,
            background: theme.inputBg, color: theme.text, fontSize: 14, outline: "none",
            fontFamily: "'Inter', system-ui, sans-serif",
          }}>
            {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
        </div>
      );
    }

    function Card({ children, style: sx }) {
      const theme = useContext(ThemeContext);
      return (
        <div style={{ background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 16, padding: 24, ...sx }}>{children}</div>
      );
    }

    function StatCard({ label, value, icon: Icon, accent }) {
      const theme = useContext(ThemeContext);
      return (
        <div style={{
          background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 14,
          padding: "18px 20px", display: "flex", alignItems: "center", gap: 14, minWidth: 0,
        }}>
          <div style={{
            width: 42, height: 42, borderRadius: 12,
            background: (accent || theme.accent) + "18",
            display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
          }}>
            <Icon size={20} color={accent || theme.accent} />
          </div>
          <div style={{ minWidth: 0 }}>
            <div style={{ color: theme.textSecondary, fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.6, marginBottom: 2 }}>{label}</div>
            <div style={{ color: theme.text, fontSize: 18, fontWeight: 700, fontFamily: "'SFMono-Regular', ui-monospace, monospace", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{value}</div>
          </div>
        </div>
      );
    }

    // ============================================================
    // DETAILED HONDA XR 125 SVG
    // ============================================================
    function MotoProgress({ percent, theme }) {
      const fill = theme.accent;
      const stroke = theme.textSecondary;
      const motoId = useId();
      const animRef = useRef(0);
      const [animatedPercent, setAnimatedPercent] = useState(0);
      useEffect(() => {
        let rafId;
        const animate = () => {
          const current = animRef.current;
          const diff = percent - current;
          if (Math.abs(diff) <= 0.5) {
            animRef.current = percent;
            setAnimatedPercent(percent);
            return;
          }
          animRef.current = current + (diff > 0 ? 0.5 : -0.5);
          setAnimatedPercent(animRef.current);
          rafId = requestAnimationFrame(animate);
        };
        rafId = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(rafId);
      }, [percent]);
      const spokeAngles = [0,30,60,90,120,150,180,210,240,270,300,330];
      const Wheel = ({ cx, cy, r, prefix, color, opacity }) => (

      const BodyPaths = ({ color, opacity, fillOpacity }) => (

          {[148, 154, 160, 166].map(yy => (
            <line key={`fin${yy}`} x1="222" y1={yy} x2="215" y2={yy} strokeWidth="1.5"/>

          <path d="M232 182 L235 195 L255 195 L258 182" fill={color} fillOpacity={fillOpacity * 0.1}/>
          <path d="M258 172 L275 180 L280 195 L270 208" strokeWidth="2"/>

          <path d="M255 98 C260 80 285 70 318 72 L332 80 L335 95 L320 108 L280 112 L260 108 Z"
            fill={color} fillOpacity={fillOpacity * 0.25} strokeWidth="2"/>
          <path d="M275 95 L285 88" strokeWidth="1" opacity={opacity * 0.6}/>
          <path d="M280 100 L290 93" strokeWidth="1" opacity={opacity * 0.6}/>
          <path d="M205 128 L225 118 L260 108 L280 112 L268 120 L238 128 L215 135 Z"
            fill={color} fillOpacity={fillOpacity * 0.12} strokeWidth="1.8"/>
          <path d="M150 155 L180 140 L205 128 L195 135 L165 148 Z"
            fill={color} fillOpacity={fillOpacity * 0.1} strokeWidth="1.5"/>
          <rect x="132" y="158" width="10" height="4" rx="2" fill={fill} fillOpacity={fillOpacity * 0.8} stroke={color} strokeWidth="1"/>

            fill={color} fillOpacity={fillOpacity * 0.06} strokeWidth="1.8"/>

            fill={color} fillOpacity={fillOpacity * 0.06} strokeWidth="1.2"/>
          <path d="M118 222 L245 190" strokeWidth="1.2" strokeDasharray="3 2" opacity={opacity * 0.5}/>
          <circle cx="245" cy="190" r="5" fill={color} fillOpacity={fillOpacity * 0.2} strokeWidth="1"/>
          <circle cx="118" cy="222" r="12" fill="none" strokeWidth="1" opacity={opacity * 0.4}/>
          <line x1="228" y1="195" x2="240" y2="258" strokeWidth="2.5" opacity={opacity * 0.5}/>
          <line x1="235" y1="195" x2="248" y2="198" strokeWidth="2.5" opacity={opacity * 0.5}/>
        </g>
      );
      return (
        <div style={{ position: "relative", width: "100%", maxWidth: 440, margin: "0 auto" }}>
          <svg viewBox="0 0 500 280" style={{ width: "100%", height: "auto" }}>
            <defs>
              <clipPath id={motoId}>
                <rect x="0" y={280 - (280 * animatedPercent / 100)} width="500" height={280 * animatedPercent / 100} />
              </clipPath>
            </defs>
            <ellipse cx="250" cy="262" rx="180" ry="10" fill={fill} opacity="0.12" />
            <Wheel cx={118} cy={222} r={46} prefix="rg" color={stroke} opacity={0.3}/>
            <Wheel cx={382} cy={222} r={46} prefix="fg" color={stroke} opacity={0.3}/>
            <BodyPaths color={stroke} opacity={0.3} fillOpacity={0}/>
            <g clipPath={`url(#${motoId})`}>
              <Wheel cx={118} cy={222} r={46} prefix="rf" color={fill} opacity={1}/>
              <Wheel cx={382} cy={222} r={46} prefix="ff" color={fill} opacity={1}/>
              <BodyPaths color={fill} opacity={1} fillOpacity={1}/>
            </g>
          </svg>
        </div>
      );
    }

    // ============================================================
    // COMPROBANTE PREVIEW MODAL
    // ============================================================
    function ComprobantePreview({ data, nombre, onClose }) {
      const theme = useContext(ThemeContext);
      if (!data) return null;
      const isImage = data.startsWith("data:image");
      return (
        <Modal open={true} onClose={onClose} title={nombre || "Comprobante"} wide>
          <div style={{ textAlign: "center" }}>
            {isImage ? (
              <img src={data} alt="Comprobante" style={{ maxWidth: "100%", maxHeight: "60vh", borderRadius: 12, border: `1px solid ${theme.border}` }} />
            ) : (
              <div style={{ padding: 40, color: theme.textSecondary }}>
                <Download size={48} style={{ marginBottom: 12, opacity: 0.4 }} />
                <p style={{ margin: "0 0 16px" }}>Archivo PDF — descargalo para verlo.</p>
              </div>
            )}
            <div style={{ marginTop: 16, display: "flex", gap: 12, justifyContent: "center" }}>
              <a href={data} download={nombre || "comprobante"} style={{ textDecoration: "none" }}>
                <Btn secondary small><Download size={14} /> Descargar</Btn>
              </a>
              <Btn secondary small onClick={onClose}>Cerrar</Btn>
            </div>
          </div>
        </Modal>
      );
    }

    // ============================================================
    // EDIT HISTORY VIEWER
    // ============================================================
    function HistoryModal({ historial, onClose }) {
      const theme = useContext(ThemeContext);
      return (
        <Modal open={true} onClose={onClose} title="Historial de Ediciones">
          {(!historial || historial.length === 0) ? (
            <p style={{ color: theme.textSecondary, textAlign: "center", padding: 20 }}>Sin ediciones registradas.</p>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {historial.map((h, i) => (
                <div key={i} style={{ padding: "10px 14px", background: theme.bg, borderRadius: 10, border: `1px solid ${theme.border}` }}>
                  <div style={{ fontSize: 11, color: theme.textSecondary, marginBottom: 4 }}>
                    {new Date(h.timestamp).toLocaleString("es-AR")}
                  </div>
                  <div style={{ fontSize: 13, color: theme.text }}>{h.descripcion}</div>
                </div>
              ))}
            </div>
          )}
        </Modal>
      );
    }

    // ============================================================
    // VENCIMIENTO ALERT BANNER
    // ============================================================
    function VencimientoAlert({ vencimientos, nombre }) {
      const theme = useContext(ThemeContext);
      if (!vencimientos) return null;
      const alertas = Object.entries(vencimientos)
        .map(([mes, fecha]) => ({ mes, fecha, dias: daysUntil(fecha) }))
        .filter(a => a.dias >= 0 && a.dias <= 7)
        .sort((a, b) => a.dias - b.dias);
      if (alertas.length === 0) return null;
      return (
        <div style={{
          background: `${theme.warning}15`, border: `1px solid ${theme.warning}40`,
          borderRadius: 14, padding: "14px 20px", marginBottom: 20,
          display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap",
        }}>
          <AlertTriangle size={22} color={theme.warning} style={{ flexShrink: 0 }} />
          <div style={{ flex: 1, minWidth: 200 }}>
            {alertas.map(a => {
              const [y, m] = a.mes.split("-").map(Number);
              return (
                <div key={a.mes} style={{ fontSize: 14, color: theme.text, marginBottom: 2 }}>
                  <strong style={{ color: theme.warning }}>
                    {a.dias === 0 ? "¡Vence HOY!" : a.dias === 1 ? "Vence MAÑANA" : `Vence en ${a.dias} días`}
                  </strong>
                  {" — "}{nombre}, {monthNames[m - 1]} {y} ({a.fecha})
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ============================================================
    // MODULE 1 — PRÉSTAMO PERSONAL
    // ============================================================
    function PrestamoModule() {
      const theme = useContext(ThemeContext);
      const toast = useContext(ToastContext);
      const { quickPayOpen, setQuickPayOpen } = useContext(QuickPayContext);
      const [confirm, ConfirmDialog] = useConfirm();
      const gradientId = useId();
      const [data, setData] = useState(() => load("deudatracker_prestamo", defaultPrestamo));
      const [showModal, setShowModal] = useState(false);
      const [editIdx, setEditIdx] = useState(null);
      const [editingAcreedor, setEditingAcreedor] = useState(false);
      const [editingMonto, setEditingMonto] = useState(false);
      const [previewComp, setPreviewComp] = useState(null);
      const [showHistory, setShowHistory] = useState(null);
      const [form, setForm] = useState({ fecha: todayStr(), monto: "", metodo: "efectivo", comprobante: null, comprobanteNombre: "", notas: "" });
      const fileRef = useRef();

      useEffect(() => { save("deudatracker_prestamo", data); }, [data]);

      const totalPagado = data.pagos.reduce((s, p) => s + p.monto, 0);
      const saldo = Math.max(0, data.montoTotal - totalPagado);
      const percent = data.montoTotal > 0 ? Math.min(100, (totalPagado / data.montoTotal) * 100) : 0;
      const promedio = data.pagos.length > 0 ? totalPagado / data.pagos.length : 0;
      const maxCuota = data.pagos.length > 0 ? Math.max(...data.pagos.map(p => p.monto)) : 0;
      const minCuota = data.pagos.length > 0 ? Math.min(...data.pagos.map(p => p.monto)) : 0;
      const last3 = data.pagos.slice(-3);
      const promLast3 = last3.length > 0 ? last3.reduce((s, p) => s + p.monto, 0) / last3.length : 0;
      const mesesRestantes = promLast3 > 0 ? Math.ceil(saldo / promLast3) : null;

      const rachaCount = useMemo(() => {
        if (data.pagos.length === 0) return 0;
        const uniqueMonths = [...new Set(data.pagos.map(p => p.fecha.slice(0, 7)))].sort().reverse();
        if (uniqueMonths.length === 0) return 0;
        let count = 1;
        for (let i = 0; i < uniqueMonths.length - 1; i++) {
          const [y1, m1] = uniqueMonths[i].split("-").map(Number);
          const [y2, m2] = uniqueMonths[i + 1].split("-").map(Number);
          if ((y1 * 12 + m1) - (y2 * 12 + m2) === 1) count++;
          else break;
        }
        return count;
      }, [data.pagos]);

      useEffect(() => {
        if (quickPayOpen) {
          setForm({ fecha: todayStr(), monto: "", metodo: "efectivo", comprobante: null, comprobanteNombre: "", notas: "" });
          setEditIdx(null);
          setShowModal(true);
          setQuickPayOpen(false);
        }
      }, [quickPayOpen, setQuickPayOpen]);

      const resetForm = () => setForm({ fecha: todayStr(), monto: "", metodo: "efectivo", comprobante: null, comprobanteNombre: "", notas: "" });
      const openAdd = () => { resetForm(); setEditIdx(null); setShowModal(true); };
      const openEdit = (i) => {
        const p = data.pagos[i];
        setForm({ fecha: p.fecha, monto: String(p.monto), metodo: p.metodo, comprobante: p.comprobante || null, comprobanteNombre: p.comprobanteNombre || "", notas: p.notas || "" });
        setEditIdx(i); setShowModal(true);
      };

      const handleFile = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { toast("Archivo demasiado grande (máx 5MB)", "error"); return; }
        const reader = new FileReader();
        reader.onload = () => setForm(f => ({ ...f, comprobante: reader.result, comprobanteNombre: file.name }));
        reader.readAsDataURL(file);
      };

      const savePago = () => {
        const monto = parseArgNum(form.monto);
        if (!monto || monto <= 0) { toast("Ingresá un monto válido", "error"); return; }
        if (!form.fecha) { toast("Seleccioná una fecha", "error"); return; }
        const now = new Date().toISOString();
        let pago;
        if (editIdx !== null) {
          const prev = data.pagos[editIdx];
          const histEntry = { timestamp: now, descripcion: `Editado: monto ${fmt(prev.monto)} a ${fmt(monto)}, fecha ${prev.fecha} a ${form.fecha}, método ${prev.metodo} a ${form.metodo}` };
          pago = { ...prev, fecha: form.fecha, monto, metodo: form.metodo, comprobante: form.comprobante, comprobanteNombre: form.comprobanteNombre, notas: form.notas, historial: [...(prev.historial || []), histEntry] };
        } else {
          pago = { id: uid(), fecha: form.fecha, monto, metodo: form.metodo, comprobante: form.comprobante, comprobanteNombre: form.comprobanteNombre, notas: form.notas, historial: [{ timestamp: now, descripcion: `Creado: ${fmt(monto)} el ${form.fecha}` }] };
        }
        const pagos = [...data.pagos];
        if (editIdx !== null) pagos[editIdx] = pago; else pagos.push(pago);
        pagos.sort((a, b) => a.fecha.localeCompare(b.fecha));
        setData(d => ({ ...d, pagos }));
        setShowModal(false);
        toast(editIdx !== null ? "Pago actualizado" : "Pago registrado");
      };

      const deletePago = async (i) => {
        if (await confirm(`¿Eliminar el pago #${i + 1} de ${fmt(data.pagos[i].monto)}?`)) {
          setData(d => ({ ...d, pagos: d.pagos.filter((_, j) => j !== i) }));
          toast("Pago eliminado");
        }
      };

      const exportResumen = () => {
        let txt = `RESUMEN DE DEUDA — ${data.acreedor}\n`;
        txt += `${"=".repeat(38)}\n`;
        txt += `Monto total: ${fmt(data.montoTotal)}\n`;
        txt += `Total pagado: ${fmt(totalPagado)}\n`;
        txt += `Saldo restante: ${fmt(saldo)}\n`;
        txt += `Progreso: ${percent.toFixed(1)}%\n`;
        txt += `Cuotas pagadas: ${data.pagos.length}\n\n`;
        txt += `DETALLE DE PAGOS:\n`;
        data.pagos.forEach((p, i) => {
          txt += `  ${i + 1}. ${p.fecha} — ${fmt(p.monto)} (${p.metodo})${p.notas ? ` — ${p.notas}` : ""}\n`;
        });
        if (mesesRestantes && saldo > 0) txt += `\nProyeccion: ~${mesesRestantes} meses restantes\n`;
        txt += `\nGenerado por DeudaTracker — ${new Date().toLocaleDateString("es-AR")}`;
        navigator.clipboard.writeText(txt).then(() => toast("Resumen copiado al portapapeles")).catch(() => toast("Error al copiar", "error"));
      };

      const chartData = data.pagos.reduce((arr, p) => {
        const prev = arr.length > 0 ? arr[arr.length - 1].saldo : data.montoTotal;
        arr.push({ name: `#${arr.length}`, saldo: Math.max(0, prev - p.monto), pagado: p.monto });
        return arr;
      }, [{ name: "Inicio", saldo: data.montoTotal, pagado: 0 }]);

      const metodos = [
        { value: "efectivo", label: "Efectivo" }, { value: "transferencia", label: "Transferencia" },
        { value: "mercadopago", label: "Mercado Pago" }, { value: "otro", label: "Otro" },
      ];

      return (
        <div>
          <ConfirmDialog />
          {previewComp && <ComprobantePreview data={previewComp.data} nombre={previewComp.nombre} onClose={() => setPreviewComp(null)} />}
          {showHistory !== null && <HistoryModal historial={data.pagos[showHistory]?.historial} onClose={() => setShowHistory(null)} />}

          <Card style={{ marginBottom: 20, position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: 0, right: 0, width: 200, height: 200, background: `radial-gradient(circle at top right, ${theme.accent}10, transparent)`, pointerEvents: "none" }} />
            <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 16, marginBottom: 16 }}>
              <div style={{ flex: 1, minWidth: 200 }}>
                <div style={{ fontSize: 12, color: theme.textSecondary, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Acreedor</div>
                {editingAcreedor ? (
                  <input autoFocus value={data.acreedor} onChange={e => setData(d => ({ ...d, acreedor: e.target.value }))}
                    onBlur={() => setEditingAcreedor(false)} onKeyDown={e => e.key === "Enter" && setEditingAcreedor(false)}
                    style={{ background: theme.inputBg, border: `1px solid ${theme.accent}`, borderRadius: 8, padding: "6px 12px", color: theme.text, fontSize: 22, fontWeight: 700, outline: "none", width: 200 }} />
                ) : (
                  <div onClick={() => setEditingAcreedor(true)} style={{ cursor: "pointer", fontSize: 24, fontWeight: 700, color: theme.text, display: "flex", alignItems: "center", gap: 8 }}>
                    {data.acreedor} <Edit3 size={14} color={theme.textSecondary} />
                  </div>
                )}
              </div>
              <div>
                <div style={{ fontSize: 12, color: theme.textSecondary, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Monto Total</div>
                {editingMonto ? (
                  <input autoFocus value={data.montoTotal} onChange={e => setData(d => ({ ...d, montoTotal: parseArgNum(e.target.value) }))}
                    onBlur={() => setEditingMonto(false)} onKeyDown={e => e.key === "Enter" && setEditingMonto(false)}
                    style={{ background: theme.inputBg, border: `1px solid ${theme.accent}`, borderRadius: 8, padding: "6px 12px", color: theme.text, fontSize: 22, fontWeight: 700, outline: "none", width: 200, fontFamily: "'SFMono-Regular', ui-monospace, monospace" }} />
                ) : (
                  <div onClick={() => setEditingMonto(true)} style={{ cursor: "pointer", fontSize: 24, fontWeight: 700, color: theme.accent, fontFamily: "'SFMono-Regular', ui-monospace, monospace", display: "flex", alignItems: "center", gap: 8 }}>
                    {fmt(data.montoTotal)} <Edit3 size={14} color={theme.textSecondary} />
                  </div>
                )}
              </div>
              <div>
                <div style={{ fontSize: 12, color: theme.textSecondary, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Fecha inicio</div>
                <input type="date" value={data.fechaInicio} onChange={e => setData(d => ({ ...d, fechaInicio: e.target.value }))}
                  style={{ background: theme.inputBg, border: `1px solid ${theme.border}`, borderRadius: 8, padding: "6px 12px", color: theme.text, fontSize: 14, outline: "none" }} />
              </div>
              <div style={{ padding: "6px 16px", borderRadius: 20, fontSize: 13, fontWeight: 600, background: saldo <= 0 ? theme.success + "20" : theme.accent + "20", color: saldo <= 0 ? theme.success : theme.accent }}>
                {saldo <= 0 ? "✓ Cancelada" : "En curso"}
              </div>
              {rachaCount >= 2 && (
                <div style={{ padding: "6px 16px", borderRadius: 20, fontSize: 13, fontWeight: 600, background: theme.success + "20", color: theme.success }}>
                  🔥 {rachaCount} meses seguidos
                </div>
              )}
              {rachaCount === 1 && (
                <div style={{ padding: "6px 16px", borderRadius: 20, fontSize: 13, fontWeight: 600, background: theme.success + "20", color: theme.success }}>
                  ✓ Pagaste este mes
                </div>
              )}
            </div>
            {data.pagos.length > 0 && (
              <Btn small secondary onClick={exportResumen} style={{ marginTop: 4 }}><Share2 size={14} /> Exportar resumen</Btn>
            )}
          </Card>

          <Card style={{ marginBottom: 20, textAlign: "center" }}>
            <MotoProgress percent={percent} theme={theme} />
            <div style={{ marginTop: 12, fontSize: 16, fontWeight: 600, color: theme.text }}>
              <span style={{ color: theme.accent, fontFamily: "'SFMono-Regular', ui-monospace, monospace", fontSize: 28 }}>{percent.toFixed(1)}%</span>
              <span style={{ color: theme.textSecondary, fontSize: 14, marginLeft: 8 }}>completado</span>
            </div>
            <div style={{ color: theme.textSecondary, fontSize: 14, marginTop: 4, fontFamily: "'SFMono-Regular', ui-monospace, monospace" }}>
              Pagaste {fmt(totalPagado)} de {fmt(data.montoTotal)}
            </div>
          </Card>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, marginBottom: 20 }}>
            <StatCard label="Total Pagado" value={fmt(totalPagado)} icon={DollarSign} />
            <StatCard label="Saldo Restante" value={fmt(saldo)} icon={TrendingDown} accent={theme.warning} />
            <StatCard label="Cuotas Pagadas" value={data.pagos.length} icon={Check} accent={theme.success} />
            <StatCard label="Promedio Cuota" value={fmt(promedio)} icon={Calendar} />
            {data.pagos.length > 0 && <StatCard label="Cuota Más Alta" value={fmt(maxCuota)} icon={ChevronUp} />}
            {data.pagos.length > 0 && <StatCard label="Cuota Más Baja" value={fmt(minCuota)} icon={ChevronDown} />}
            {mesesRestantes && saldo > 0 && <StatCard label="Proyección" value={`~${mesesRestantes} meses`} icon={Clock} accent={theme.accent} />}
          </div>

          {data.pagos.length > 0 && (
            <Card style={{ marginBottom: 20 }}>
              <h4 style={{ color: theme.text, marginTop: 0, marginBottom: 16, fontSize: 16, fontWeight: 700 }}>Evolución de la deuda</h4>
              <ResponsiveContainer width="100%" height={220}>
                <AreaChart data={chartData}>
                  <defs>
                    <linearGradient id={gradientId} x1="0" y1="0" x2="0" y2="1">
                      <stop offset="5%" stopColor={theme.accent} stopOpacity={0.3} />
                      <stop offset="95%" stopColor={theme.accent} stopOpacity={0} />
                    </linearGradient>
                  </defs>
                  <CartesianGrid strokeDasharray="3 3" stroke={theme.border} />
                  <XAxis dataKey="name" tick={{ fill: theme.textSecondary, fontSize: 12 }} />
                  <YAxis tick={{ fill: theme.textSecondary, fontSize: 12 }} tickFormatter={v => "$" + (v / 1000000).toFixed(1) + "M"} />
                  <Tooltip contentStyle={{ background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 10, color: theme.text, fontSize: 13 }}
                    formatter={(v) => [fmt(v), "Saldo"]} />
                  <Area type="monotone" dataKey="saldo" stroke={theme.accent} fill={`url(#${gradientId})`} strokeWidth={2.5} />
                </AreaChart>
              </ResponsiveContainer>
            </Card>
          )}

          <Card>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <h4 style={{ color: theme.text, margin: 0, fontSize: 16, fontWeight: 700 }}>Historial de Pagos</h4>
              <Btn small onClick={openAdd}><Plus size={16} /> Registrar pago</Btn>
            </div>
            {data.pagos.length === 0 ? (
              <div style={{ textAlign: "center", padding: "40px 20px", color: theme.textSecondary }}>
                <Bike size={48} style={{ marginBottom: 12, opacity: 0.3 }} />
                <p style={{ margin: "0 0 16px", fontSize: 15 }}>Todavía no registraste ningún pago</p>
                <Btn onClick={openAdd}><Plus size={16} /> Registrar primer pago</Btn>
              </div>
            ) : (
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "separate", borderSpacing: "0 6px" }}>
                  <thead>
                    <tr style={{ textAlign: "left" }}>
                      {["#", "Fecha", "Monto", "Método", "Comprobante", "Notas", ""].map(h => (
                        <th key={h} style={{ padding: "8px 12px", color: theme.textSecondary, fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5, whiteSpace: "nowrap" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {data.pagos.map((p, i) => (
                      <tr key={p.id} style={{ background: i % 2 === 0 ? theme.surface : theme.bg }}>
                        <td style={{ padding: "10px 12px", color: theme.textSecondary, fontSize: 13, fontWeight: 600, borderRadius: "8px 0 0 8px" }}>{i + 1}</td>
                        <td style={{ padding: "10px 12px", color: theme.text, fontSize: 13 }}>{p.fecha}</td>
                        <td style={{ padding: "10px 12px", color: theme.accent, fontSize: 14, fontWeight: 700, fontFamily: "'SFMono-Regular', ui-monospace, monospace" }}>{fmt(p.monto)}</td>
                        <td style={{ padding: "10px 12px", color: theme.text, fontSize: 13, textTransform: "capitalize" }}>{p.metodo}</td>
                        <td style={{ padding: "10px 12px" }}>
                          {p.comprobante ? (
                            <button onClick={() => setPreviewComp({ data: p.comprobante, nombre: p.comprobanteNombre })}
                              style={{ background: "none", border: "none", color: theme.accent, fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 4, padding: 0 }}>
                              <Eye size={14} /> {(p.comprobanteNombre || "").slice(0, 15) || "Ver"}
                            </button>
                          ) : <span style={{ color: theme.textSecondary, fontSize: 12 }}>—</span>}
                        </td>
                        <td style={{ padding: "10px 12px", color: theme.textSecondary, fontSize: 12, maxWidth: 120, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.notas || "—"}</td>
                        <td style={{ padding: "10px 12px", borderRadius: "0 8px 8px 0", whiteSpace: "nowrap" }}>
                          {p.historial?.length > 0 && (
                            <button onClick={() => setShowHistory(i)} style={{ background: "none", border: "none", color: theme.textSecondary, cursor: "pointer", padding: 4 }} title="Historial"><History size={14} /></button>
                          )}
                          <button onClick={() => openEdit(i)} style={{ background: "none", border: "none", color: theme.textSecondary, cursor: "pointer", padding: 4 }}><Edit3 size={15} /></button>
                          <button onClick={() => deletePago(i)} style={{ background: "none", border: "none", color: theme.danger, cursor: "pointer", padding: 4 }}><Trash2 size={15} /></button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </Card>

          <Modal open={showModal} onClose={() => setShowModal(false)} title={editIdx !== null ? "Editar Pago" : "Registrar Pago"}>
            <Input label="Fecha" value={form.fecha} onChange={v => setForm(f => ({ ...f, fecha: v }))} type="date" />
            <Input label="Monto ($)" value={form.monto} onChange={v => setForm(f => ({ ...f, monto: v }))} placeholder="150.000" mono />
            <Select label="Método de pago" value={form.metodo} onChange={v => setForm(f => ({ ...f, metodo: v }))} options={metodos} />
            <Input label="Notas (opcional)" value={form.notas} onChange={v => setForm(f => ({ ...f, notas: v }))} placeholder="Pago de enero..." />
            <div style={{ marginBottom: 14 }}>
              <label style={{ display: "block", color: theme.textSecondary, fontSize: 12, marginBottom: 6, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>Comprobante</label>
              <input ref={fileRef} type="file" accept="image/*,.pdf" onChange={handleFile} style={{ display: "none" }} />
              <Btn secondary small onClick={() => fileRef.current?.click()}><Paperclip size={14} /> {form.comprobanteNombre || "Adjuntar archivo"}</Btn>
              {form.comprobante && <span style={{ color: theme.success, fontSize: 12, marginLeft: 10 }}>✓ Cargado</span>}
            </div>
            <div style={{ display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 20 }}>
              <Btn secondary onClick={() => setShowModal(false)}>Cancelar</Btn>
              <Btn onClick={savePago}>{editIdx !== null ? "Guardar" : "Registrar"}</Btn>
            </div>
          </Modal>
        </div>
      );
    }

    // ============================================================
    // MODULE 2 — CRÉDITOS DIGITALES
    // ============================================================
    const categorias = [
      { value: "comida", label: "🍔 Comida" }, { value: "indumentaria", label: "👕 Indumentaria" },
      { value: "tecnologia", label: "💻 Tecnología" }, { value: "salud", label: "🏥 Salud" },
      { value: "emergencia", label: "🚨 Emergencia" }, { value: "otro", label: "📦 Otro" },
    ];
    const catEmojis = { comida: "🍔", indumentaria: "👕", tecnologia: "💻", salud: "🏥", emergencia: "🚨", otro: "📦" };

    function CreditoModule({ storageKey, defaultData }) {
      const theme = useContext(ThemeContext);
      const toast = useContext(ToastContext);
      const [confirm, ConfirmDialog] = useConfirm();
      const [data, setData] = useState(() => load(storageKey, defaultData));
      const [showModal, setShowModal] = useState(false);
      const [editIdx, setEditIdx] = useState(null);
      const [filterMes, setFilterMes] = useState("");
      const [filterCat, setFilterCat] = useState("");
      const [searchQ, setSearchQ] = useState("");
      const [showPagoMes, setShowPagoMes] = useState(false);
      const [pagoMesForm, setPagoMesForm] = useState({ mes: "", monto: "" });
      const [showVencForm, setShowVencForm] = useState(false);
      const [vencForm, setVencForm] = useState({ mes: "", fecha: "" });
      const [form, setForm] = useState({
        descripcion: "", monto: "", enCuotas: false, cantCuotas: "1",
        categoria: "otro", fecha: todayStr(), mesResumen: new Date().toISOString().slice(0, 7),
      });

      useEffect(() => { save(storageKey, data); }, [data, storageKey]);

      const resetForm = () => setForm({
        descripcion: "", monto: "", enCuotas: false, cantCuotas: "1",
        categoria: "otro", fecha: todayStr(), mesResumen: new Date().toISOString().slice(0, 7),
      });

      const openAdd = () => { resetForm(); setEditIdx(null); setShowModal(true); };
      const openEdit = (i) => {
        const m = data.movimientos[i];
        setForm({ descripcion: m.descripcion, monto: String(m.monto), enCuotas: m.enCuotas, cantCuotas: String(m.cantCuotas || 1), categoria: m.categoria, fecha: m.fecha, mesResumen: m.mesResumen });
        setEditIdx(i); setShowModal(true);
      };

      const saveMovimiento = () => {
        const monto = parseArgNum(form.monto);
        if (!form.descripcion.trim()) { toast("Ingresá una descripción", "error"); return; }
        if (!monto || monto <= 0) { toast("Ingresá un monto válido", "error"); return; }
        const cantCuotas = form.enCuotas ? Math.max(1, parseInt(form.cantCuotas) || 1) : 1;
        const montoCuota = form.enCuotas ? Math.round(monto / cantCuotas) : monto;
        const mov = {
          id: editIdx !== null ? data.movimientos[editIdx].id : uid(),
          descripcion: form.descripcion.trim(), monto, enCuotas: form.enCuotas,
          cantCuotas, montoCuota, categoria: form.categoria,
          fecha: form.fecha, mesResumen: form.mesResumen,
        };
        const movs = [...data.movimientos];
        if (editIdx !== null) movs[editIdx] = mov; else movs.push(mov);
        movs.sort((a, b) => a.fecha.localeCompare(b.fecha));
        setData(d => ({ ...d, movimientos: movs }));
        setShowModal(false);
        toast(editIdx !== null ? "Movimiento actualizado" : "Movimiento registrado");
      };

      const deleteMovimiento = async (i) => {
        if (await confirm(`¿Eliminar "${data.movimientos[i].descripcion}"?`)) {
          setData(d => ({ ...d, movimientos: d.movimientos.filter((_, j) => j !== i) }));
          toast("Movimiento eliminado");
        }
      };

      const getMesData = useCallback((mesKey) => {
        const [y, m] = mesKey.split("-").map(Number);
        let total = 0, nuevos = 0, arrastre = 0;
        let detalles = [];
        data.movimientos.forEach(mov => {
          const [my, mm] = mov.mesResumen.split("-").map(Number);
          const cantCuotas = mov.enCuotas ? mov.cantCuotas : 1;
          const montoCuota = mov.enCuotas ? mov.montoCuota : mov.monto;
          for (let c = 0; c < cantCuotas; c++) {
            let cm = mm + c, cy = my;
            while (cm > 12) { cm -= 12; cy++; }
            if (cy === y && cm === m) {
              total += montoCuota;
              const isNew = (c === 0);
              if (isNew) nuevos += montoCuota; else arrastre += montoCuota;
              detalles.push({ ...mov, cuotaActual: c + 1, impacto: montoCuota, tipo: isNew ? "nuevo" : "arrastre" });
            }
          }
        });
        return { total, nuevos, arrastre, detalles };
      }, [data.movimientos]);

      const mesesConDatos = useMemo(() => {
        const set = new Set();
        data.movimientos.forEach(m => {
          const cantCuotas = m.enCuotas ? m.cantCuotas : 1;
          for (let c = 0; c < cantCuotas; c++) { set.add(addMonths(m.mesResumen, c)); }
        });
        return [...set].sort();
      }, [data.movimientos]);

      const pagosMensuales = data.pagosMensuales || [];
      const vencimientos = data.vencimientos || {};
      const mesActual = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, "0")}`;
      const mesActualData = getMesData(mesActual);

      const totalPendiente = useMemo(() => {
        let t = 0;
        mesesConDatos.forEach(mes => { t += getMesData(mes).total; });
        return Math.max(0, t - pagosMensuales.reduce((s, p) => s + p.monto, 0));
      }, [mesesConDatos, getMesData, pagosMensuales]);

      const savePagoMes = () => {
        const monto = parseArgNum(pagoMesForm.monto);
        if (!monto) { toast("Ingresá un monto", "error"); return; }
        setData(d => ({ ...d, pagosMensuales: [...(d.pagosMensuales || []), { id: uid(), mes: pagoMesForm.mes, monto, fecha: todayStr() }] }));
        setShowPagoMes(false); toast("Pago mensual registrado");
      };

      const saveVencimiento = () => {
        if (!vencForm.mes || !vencForm.fecha) { toast("Completá mes y fecha", "error"); return; }
        setData(d => ({ ...d, vencimientos: { ...(d.vencimientos || {}), [vencForm.mes]: vencForm.fecha } }));
        setShowVencForm(false); toast("Vencimiento guardado");
      };

      const filtered = data.movimientos.filter(m => {
        if (filterMes && m.mesResumen !== filterMes) return false;
        if (filterCat && m.categoria !== filterCat) return false;
        if (searchQ && !m.descripcion.toLowerCase().includes(searchQ.toLowerCase())) return false;
        return true;
      });

      const catChartData = useMemo(() => {
        const targetMes = filterMes || mesActual;
        const md = getMesData(targetMes);
        const bycat = {};
        md.detalles.forEach(d => { bycat[d.categoria] = (bycat[d.categoria] || 0) + d.impacto; });
        return categorias.map(c => ({ name: c.label.split(" ").slice(1).join(" "), monto: bycat[c.value] || 0 })).filter(c => c.monto > 0);
      }, [filterMes, mesActual, getMesData]);

      const copyMesSummary = (mesKey) => {
        const md = getMesData(mesKey);
        const [y, m] = mesKey.split("-").map(Number);
        const pago = pagosMensuales.find(p => p.mes === mesKey);
        let txt = `${data.nombre} — ${monthNames[m - 1]} ${y}\n`;
        txt += `${"─".repeat(35)}\n`;
        txt += `Total: ${fmt(md.total)}\n`;
        txt += `  Nuevos: ${fmt(md.nuevos)}\n`;
        txt += `  Arrastre: ${fmt(md.arrastre)}\n`;
        txt += `  ${md.detalles.length} movimiento${md.detalles.length !== 1 ? "s" : ""}\n`;
        if (pago) txt += `  Pagado: ${fmt(pago.monto)}\n`;
        txt += `\nDetalle:\n`;
        md.detalles.forEach(d => {
          txt += `  - ${d.descripcion} — ${fmt(d.impacto)}`;
          if (d.tipo === "arrastre") txt += ` (cuota ${d.cuotaActual}/${d.cantCuotas})`;
          txt += `\n`;
        });
        txt += `\nGenerado por DeudaTracker`;
        navigator.clipboard.writeText(txt).then(() => toast("Resumen copiado")).catch(() => toast("Error al copiar", "error"));
      };

      return (
        <div>
          <ConfirmDialog />
          <VencimientoAlert vencimientos={vencimientos} nombre={data.nombre} />

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, marginBottom: 20 }}>
            <StatCard label="Deuda Pendiente" value={fmt(totalPendiente)} icon={CreditCard} />
            <StatCard label="Pagado Total" value={fmt(pagosMensuales.reduce((s, p) => s + p.monto, 0))} icon={Check} accent={theme.success} />
            <StatCard label="Este Mes" value={fmt(mesActualData.total)} icon={Calendar} accent={theme.accent} />
            <StatCard label="Arrastre este mes" value={fmt(mesActualData.arrastre)} icon={TrendingDown} accent={theme.warning} />
          </div>

          {catChartData.length > 0 && (
            <Card style={{ marginBottom: 20 }}>
              <h4 style={{ color: theme.text, marginTop: 0, marginBottom: 16, fontSize: 16, fontWeight: 700 }}>
                Gastos por Categoría {filterMes ? `— ${(() => { const [y, m] = filterMes.split("-").map(Number); return `${monthNames[m-1]} ${y}`; })()}` : "(mes actual)"}
              </h4>
              <ResponsiveContainer width="100%" height={Math.max(120, catChartData.length * 45)}>
                <BarChart data={catChartData} layout="vertical">
                  <CartesianGrid strokeDasharray="3 3" stroke={theme.border} horizontal={false} />
                  <XAxis type="number" tick={{ fill: theme.textSecondary, fontSize: 11 }} tickFormatter={v => fmt(v)} />
                  <YAxis type="category" dataKey="name" tick={{ fill: theme.text, fontSize: 12 }} width={100} />
                  <Tooltip contentStyle={{ background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: 10, color: theme.text, fontSize: 13 }}
                    formatter={v => [fmt(v), "Monto"]} />
                  <Bar dataKey="monto" fill={theme.accent} radius={[0, 6, 6, 0]} />
                </BarChart>
              </ResponsiveContainer>
            </Card>
          )}

          {mesesConDatos.length > 0 && (
            <Card style={{ marginBottom: 20 }}>
              <h4 style={{ color: theme.text, marginTop: 0, marginBottom: 16, fontSize: 16, fontWeight: 700 }}>Resúmenes Mensuales</h4>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
                {mesesConDatos.map(mes => {
                  const md = getMesData(mes);
                  const [y, m] = mes.split("-").map(Number);
                  const pago = pagosMensuales.find(p => p.mes === mes);
                  const estado = pago ? (pago.monto >= md.total ? "pagado" : "parcial") : "pendiente";
                  const venc = vencimientos[mes];
                  const diasVenc = venc ? daysUntil(venc) : null;
                  return (
                    <div key={mes} style={{
                      background: theme.bg, border: `1px solid ${theme.border}`, borderRadius: 12,
                      padding: 16, minWidth: 185, flex: "1 1 185px",
                      borderTop: `3px solid ${estado === "pagado" ? theme.success : estado === "parcial" ? theme.warning : theme.accent}`,
                    }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color: theme.text }}>{monthNames[m - 1]} {y}</div>
                        <button onClick={() => copyMesSummary(mes)} title="Copiar resumen" style={{ background: "none", border: "none", color: theme.textSecondary, cursor: "pointer", padding: 2 }}><Copy size={14} /></button>
                      </div>
                      <div style={{ fontSize: 20, fontWeight: 700, color: theme.accent, fontFamily: "'SFMono-Regular', ui-monospace, monospace", marginBottom: 6 }}>{fmt(md.total)}</div>
                      <div style={{ fontSize: 11, color: theme.textSecondary, display: "flex", gap: 8, marginBottom: 6, flexWrap: "wrap" }}>
                        <span style={{ color: theme.success }}>🆕 {fmt(md.nuevos)}</span>
                        {md.arrastre > 0 && <span style={{ color: theme.warning }}>🔄 {fmt(md.arrastre)}</span>}
                      </div>
                      <div style={{ fontSize: 11, color: theme.textSecondary, marginBottom: 6 }}>{md.detalles.length} mov.</div>
                      {venc && (
                        <div style={{ fontSize: 11, color: diasVenc !== null && diasVenc <= 7 && diasVenc >= 0 ? theme.warning : theme.textSecondary, marginBottom: 6 }}>
                          Vence: {venc} {diasVenc !== null && diasVenc >= 0 && diasVenc <= 7 ? `(${diasVenc}d)` : ""}
                        </div>
                      )}
                      <div style={{
                        fontSize: 11, fontWeight: 600, padding: "3px 10px", borderRadius: 10, display: "inline-block",
                        background: estado === "pagado" ? theme.success + "20" : estado === "parcial" ? theme.warning + "20" : theme.textSecondary + "20",
                        color: estado === "pagado" ? theme.success : estado === "parcial" ? theme.warning : theme.textSecondary,
                      }}>
                        {estado === "pagado" ? "Pagado" : estado === "parcial" ? "Parcial" : "Pendiente"}
                      </div>
                    </div>
                  );
                })}
              </div>
            </Card>
          )}

          <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginBottom: 20 }}>
            <Btn onClick={openAdd}><Plus size={16} /> Nuevo movimiento</Btn>
            <Btn secondary onClick={() => { setPagoMesForm({ mes: mesActual, monto: "" }); setShowPagoMes(true); }}>
              <DollarSign size={16} /> Registrar pago
            </Btn>
            <Btn secondary onClick={() => { setVencForm({ mes: mesActual, fecha: "" }); setShowVencForm(true); }}>
              <Calendar size={16} /> Cargar vencimiento
            </Btn>
          </div>

          <Card style={{ marginBottom: 20 }}>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 12, alignItems: "flex-end" }}>
              <div style={{ flex: "1 1 200px" }}>
                <Input label="Buscar" value={searchQ} onChange={setSearchQ} placeholder="Descripción..." style={{ marginBottom: 0 }} />
              </div>
              <div style={{ flex: "1 1 150px" }}>
                <Select label="Mes" value={filterMes} onChange={setFilterMes}
                  options={[{ value: "", label: "Todos" }, ...mesesConDatos.map(m => {
                    const [y, mo] = m.split("-").map(Number);
                    return { value: m, label: `${monthNames[mo - 1]} ${y}` };
                  })]} />
              </div>
              <div style={{ flex: "1 1 150px" }}>
                <Select label="Categoría" value={filterCat} onChange={setFilterCat}
                  options={[{ value: "", label: "Todas" }, ...categorias]} />
              </div>
            </div>
          </Card>

          <Card>
            <h4 style={{ color: theme.text, marginTop: 0, marginBottom: 16, fontSize: 16, fontWeight: 700 }}>Movimientos ({filtered.length})</h4>
            {filtered.length === 0 ? (
              <div style={{ textAlign: "center", padding: "40px 20px", color: theme.textSecondary }}>
                <CreditCard size={48} style={{ marginBottom: 12, opacity: 0.3 }} />
                <p style={{ margin: "0 0 16px", fontSize: 15 }}>No hay movimientos registrados</p>
                <Btn onClick={openAdd}><Plus size={16} /> Agregar movimiento</Btn>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {filtered.map(m => {
                  const origIdx = data.movimientos.findIndex(mov => mov.id === m.id);
                  return (
                    <div key={m.id} style={{
                      display: "flex", flexWrap: "wrap", alignItems: "center", gap: 12, padding: "12px 16px",
                      background: theme.bg, borderRadius: 12, border: `1px solid ${theme.border}`,
                    }}>
                      <div style={{ fontSize: 20, width: 36, textAlign: "center", flexShrink: 0 }}>{catEmojis[m.categoria] || "📦"}</div>
                      <div style={{ flex: 1, minWidth: 120 }}>
                        <div style={{ color: theme.text, fontSize: 14, fontWeight: 600 }}>{m.descripcion}</div>
                        <div style={{ color: theme.textSecondary, fontSize: 12, marginTop: 2 }}>
                          {m.fecha}
                          {m.enCuotas && m.cantCuotas > 1 && ` · ${m.cantCuotas} cuotas de ${fmt(m.montoCuota)}`}
                          {m.enCuotas && m.cantCuotas > 1 && <span style={{ color: theme.warning, marginLeft: 6 }}>(impacta {m.cantCuotas} meses)</span>}
                        </div>
                      </div>
                      <div style={{ color: theme.accent, fontWeight: 700, fontSize: 16, fontFamily: "'SFMono-Regular', ui-monospace, monospace", flexShrink: 0 }}>{fmt(m.monto)}</div>
                      <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                        <button onClick={() => openEdit(origIdx)} style={{ background: "none", border: "none", color: theme.textSecondary, cursor: "pointer", padding: 4 }}><Edit3 size={15} /></button>
                        <button onClick={() => deleteMovimiento(origIdx)} style={{ background: "none", border: "none", color: theme.danger, cursor: "pointer", padding: 4 }}><Trash2 size={15} /></button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </Card>

          <Modal open={showModal} onClose={() => setShowModal(false)} title={editIdx !== null ? "Editar Movimiento" : "Nuevo Movimiento"}>
            <Input label="Descripción" value={form.descripcion} onChange={v => setForm(f => ({ ...f, descripcion: v }))} placeholder="Compra en Mercado Libre..." />
            <Input label="Monto total ($)" value={form.monto} onChange={v => setForm(f => ({ ...f, monto: v }))} placeholder="25.000" mono />
            <div style={{ marginBottom: 14 }}>
              <label style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", color: theme.text, fontSize: 14 }}>
                <input type="checkbox" checked={form.enCuotas} onChange={e => setForm(f => ({ ...f, enCuotas: e.target.checked }))}
                  style={{ width: 18, height: 18, accentColor: theme.accent }} />
                ¿En cuotas?
              </label>
            </div>
            {form.enCuotas && (
              <>
                <Input label="Cantidad de cuotas" value={form.cantCuotas} onChange={v => setForm(f => ({ ...f, cantCuotas: v }))} type="number" />
                {parseArgNum(form.monto) > 0 && parseInt(form.cantCuotas) > 0 && (
                  <div style={{ color: theme.textSecondary, fontSize: 13, marginBottom: 14, padding: "8px 12px", background: theme.bg, borderRadius: 8 }}>
                    {parseInt(form.cantCuotas)} cuotas de <strong style={{ color: theme.accent }}>{fmt(Math.round(parseArgNum(form.monto) / parseInt(form.cantCuotas)))}</strong> — impacta desde {form.mesResumen} hasta {addMonths(form.mesResumen, parseInt(form.cantCuotas) - 1)}
                  </div>
                )}
              </>
            )}
            <Select label="Categoría" value={form.categoria} onChange={v => setForm(f => ({ ...f, categoria: v }))} options={categorias} />
            <Input label="Fecha del movimiento" value={form.fecha} onChange={v => setForm(f => ({ ...f, fecha: v }))} type="date" />
            <MonthInput label="Mes de resumen (inicio)" value={form.mesResumen} onChange={v => setForm(f => ({ ...f, mesResumen: v }))} />
            <div style={{ display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 20 }}>
              <Btn secondary onClick={() => setShowModal(false)}>Cancelar</Btn>
              <Btn onClick={saveMovimiento}>{editIdx !== null ? "Guardar" : "Agregar"}</Btn>
            </div>
          </Modal>

          <Modal open={showPagoMes} onClose={() => setShowPagoMes(false)} title="Registrar Pago Mensual">
            <MonthInput label="Mes" value={pagoMesForm.mes} onChange={v => setPagoMesForm(f => ({ ...f, mes: v }))} />
            <Input label="Monto pagado ($)" value={pagoMesForm.monto} onChange={v => setPagoMesForm(f => ({ ...f, monto: v }))} placeholder="50.000" mono />
            <div style={{ display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 20 }}>
              <Btn secondary onClick={() => setShowPagoMes(false)}>Cancelar</Btn>
              <Btn onClick={savePagoMes}>Registrar</Btn>
            </div>
          </Modal>

          <Modal open={showVencForm} onClose={() => setShowVencForm(false)} title="Fecha de Vencimiento">
            <MonthInput label="Mes del resumen" value={vencForm.mes} onChange={v => setVencForm(f => ({ ...f, mes: v }))} />
            <Input label="Fecha de vencimiento" value={vencForm.fecha} onChange={v => setVencForm(f => ({ ...f, fecha: v }))} type="date" />
            <div style={{ display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 20 }}>
              <Btn secondary onClick={() => setShowVencForm(false)}>Cancelar</Btn>
              <Btn onClick={saveVencimiento}>Guardar</Btn>
            </div>
          </Modal>
        </div>
      );
    }

    function CreditosModule() {
      const theme = useContext(ThemeContext);
      const [tab, setTab] = useState("naranjax");
      return (
        <div>
          <div style={{ display: "flex", gap: 4, marginBottom: 20, background: theme.surface, borderRadius: 14, padding: 4, border: `1px solid ${theme.border}` }}>
            {[
              { id: "naranjax", label: "🟠 Naranja X", desc: "Tarjeta de crédito" },
              { id: "mercadocredito", label: "🔵 Mercado Crédito", desc: "Crédito personal" },
            ].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                flex: 1, padding: "12px 16px", borderRadius: 10, border: "none", cursor: "pointer",
                background: tab === t.id ? theme.accent : "transparent",
                color: tab === t.id ? "#fff" : theme.textSecondary,
                transition: "all 0.2s ease", fontFamily: "'Inter', system-ui, sans-serif", fontSize: 14, fontWeight: 600,
              }}>
                <div>{t.label}</div>
                <div style={{ fontSize: 11, fontWeight: 400, opacity: 0.8, marginTop: 2 }}>{t.desc}</div>
              </button>
            ))}
          </div>
          {tab === "naranjax" ? (
            <CreditoModule storageKey="deudatracker_naranjax" defaultData={defaultNaranjaX} />
          ) : (
            <CreditoModule storageKey="deudatracker_mercadocredito" defaultData={defaultMercadoCredito} />
          )}
        </div>
      );
    }

    // ============================================================
    // QUOTA LISTENER
    // ============================================================
    function QuotaListener() {
      const toast = useContext(ToastContext);
      useEffect(() => {
        const handler = () => toast("⚠️ Almacenamiento lleno. Eliminá comprobantes adjuntos para liberar espacio.", "error");
        window.addEventListener('storageQuotaExceeded', handler);
        return () => window.removeEventListener('storageQuotaExceeded', handler);
      }, [toast]);
      return null;
    }

    // ============================================================
    // MAIN APP
    // ============================================================
    function DeudaTracker() {
      const [isDark, setIsDark] = useState(() => {
        const saved = localStorage.getItem("deudatracker_theme");
        return saved ? saved === "dark" : true;
      });
      const theme = isDark ? darkTheme : lightTheme;
      const [activeTab, setActiveTab] = useState("prestamo");
      const [quickPayOpen, setQuickPayOpen] = useState(false);
      const [fabHov, setFabHov] = useState(false);
      const [isMobile, setIsMobile] = useState(window.innerWidth < 600);

      useEffect(() => {
        const handler = () => setIsMobile(window.innerWidth < 600);
        window.addEventListener('resize', handler);
        return () => window.removeEventListener('resize', handler);
      }, []);

      useEffect(() => { localStorage.setItem("deudatracker_theme", isDark ? "dark" : "light"); }, [isDark]);

      return (
        <ThemeContext.Provider value={theme}>
          <ToastProvider>
            <QuickPayContext.Provider value={{ quickPayOpen, setQuickPayOpen }}>
              <QuotaListener />
              <div style={{
                minHeight: "100vh", background: theme.bg, color: theme.text,
                fontFamily: "'Inter', system-ui, -apple-system, sans-serif",
                transition: "background 0.3s ease, color 0.3s ease",
              }}>
                <style>{`
                  input[type="date"]::-webkit-calendar-picker-indicator { filter: ${isDark ? "invert(1)" : "none"}; }
                  ::-webkit-scrollbar-thumb { background: ${theme.border}; }
                `}</style>

                <header style={{
                  position: "sticky", top: 0, zIndex: 100,
                  background: theme.surface + "ee", backdropFilter: "blur(12px)",
                  borderBottom: `1px solid ${theme.border}`, padding: "0 20px",
                }}>
                  <div style={{ maxWidth: 960, margin: "0 auto", display: "flex", alignItems: "center", height: 64, gap: 16 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
                      <div style={{
                        width: 36, height: 36, borderRadius: 10, background: `linear-gradient(135deg, ${theme.accent}, ${theme.accentHover})`,
                        display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 800, fontSize: 16,
                      }}>D</div>
                      <span style={{ fontWeight: 800, fontSize: 18, color: theme.text, letterSpacing: -0.5 }}>
                        Deuda<span style={{ color: theme.accent }}>Tracker</span>
                      </span>
                    </div>
                    <nav style={{ display: "flex", gap: 4, flex: 1, justifyContent: "center" }}>
                      {[{ id: "prestamo", label: "🏍️ Préstamo" }, { id: "creditos", label: "💳 Créditos" }].map(t => (
                        <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
                          padding: "8px 20px", borderRadius: 10, border: "none", cursor: "pointer",
                          background: activeTab === t.id ? theme.accent + "20" : "transparent",
                          color: activeTab === t.id ? theme.accent : theme.textSecondary,
                          fontWeight: 600, fontSize: 14, transition: "all 0.2s ease", fontFamily: "'Inter', system-ui, sans-serif",
                        }}>{t.label}</button>
                      ))}
                    </nav>
                    <button onClick={() => setIsDark(!isDark)} style={{
                      background: theme.bg, border: `1px solid ${theme.border}`, borderRadius: 10,
                      width: 40, height: 40, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                      color: theme.textSecondary, transition: "all 0.2s ease", flexShrink: 0,
                    }}>
                      {isDark ? <Sun size={18} /> : <Moon size={18} />}
                    </button>
                  </div>
                </header>

                <main style={{ maxWidth: 960, margin: "0 auto", padding: "24px 20px 60px" }}>
                  {activeTab === "prestamo" ? <PrestamoModule /> : <CreditosModule />}
                </main>

                <div style={{ textAlign: "center", padding: "20px", color: theme.textSecondary, fontSize: 12, borderTop: `1px solid ${theme.border}` }}>
                  DeudaTracker · {new Date().toLocaleDateString("es-AR")}
                </div>

                {activeTab === "prestamo" && (
                  <button
                    onClick={() => setQuickPayOpen(true)}
                    onMouseEnter={() => setFabHov(true)}
                    onMouseLeave={() => setFabHov(false)}
                    title="Registrar pago rápido"
                    style={{
                      position: "fixed", bottom: isMobile ? 80 : 24, left: 24, zIndex: 500,
                      width: 56, height: 56, borderRadius: "50%", background: theme.accent,
                      border: "none", cursor: "pointer",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      boxShadow: fabHov ? "0 8px 25px rgba(0,0,0,0.4)" : "0 4px 15px rgba(0,0,0,0.25)",
                      transform: fabHov ? "scale(1.08)" : "scale(1)",
                      transition: "all 0.2s ease",
                    }}
                  >
                    <Plus size={24} color="#fff" />
                  </button>
                )}
              </div>
            </QuickPayContext.Provider>
          </ToastProvider>
        </ThemeContext.Provider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(DeudaTracker));
  </script>
</body>
</html>
